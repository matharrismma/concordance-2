<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Floor of Discovery · Narrow Highway</title>
<meta name="description" content="The floor, made visible — Scripture and the created order as one design. By seeing it, the eye is turned upward.">
<style>
  :root{ --gold:#c69a4a; --gold-hi:#e7c877; --ink:#efe7d3; --faint:#9a875f; --ground:#161009; }
  *{ box-sizing:border-box }
  html,body{ margin:0; background:radial-gradient(120% 90% at 50% 0%, #241a0e 0%, #161009 55%, #0c0906 100%);
             color:var(--ink); font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
             -webkit-font-smoothing:antialiased }
  a{ color:var(--gold-hi); text-decoration:none }
  .wrap{ max-width:1040px; margin:0 auto; padding:2.2rem 1.1rem 4rem }
  .crown{ text-align:center; margin:.5rem 0 1.4rem }
  .crown .v{ font-size:clamp(1.15rem,3.4vw,1.7rem); font-style:italic; letter-spacing:.01em;
             color:var(--gold-hi); text-shadow:0 0 22px rgba(198,154,74,.35) }
  .crown .r{ display:block; margin-top:.5rem; font-size:.72rem; letter-spacing:.32em;
             text-transform:uppercase; color:var(--faint) }
  .stage{ position:relative; width:100%; aspect-ratio:1/1; max-width:760px; margin:0 auto }
  svg{ width:100%; height:100%; display:block; overflow:visible }
  .edge{ stroke:rgba(198,154,74,.28); fill:none }
  .node{ cursor:pointer }
  .node circle{ fill:var(--gold); transition:fill .15s, r .15s }
  .node.root circle{ fill:var(--gold-hi); filter:drop-shadow(0 0 16px rgba(231,200,119,.85)) }
  .node.spine circle{ fill:var(--gold-hi) }
  .node:hover circle,.node.on circle{ fill:#fff }
  .lbl{ fill:var(--ink); font-size:13px; paint-order:stroke; stroke:rgba(12,9,6,.85); stroke-width:3px;
        pointer-events:none }
  .lbl.small{ fill:var(--faint); font-size:11px }
  .tip{ position:absolute; pointer-events:none; background:rgba(20,14,7,.94); color:var(--ink);
        border:1px solid rgba(198,154,74,.45); border-radius:3px; padding:.35rem .6rem; font-size:.82rem;
        transform:translate(-50%,-140%); white-space:nowrap; opacity:0; transition:opacity .12s; z-index:5 }
  .halves{ display:flex; gap:1.5rem; justify-content:center; margin:.2rem 0 1.4rem; font-size:.8rem;
           color:var(--faint); flex-wrap:wrap }
  .halves b{ color:var(--gold-hi); font-weight:600 }
  h2{ text-align:center; font-weight:600; font-size:1.15rem; color:var(--gold-hi); margin:2.2rem 0 1rem;
      letter-spacing:.01em }
  .grafts{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:.5rem .9rem;
           max-width:820px; margin:0 auto }
  .graft{ display:flex; align-items:center; gap:.5rem; padding:.5rem .2rem;
          border-bottom:1px solid rgba(198,154,74,.14); font-size:.92rem }
  .graft .s{ color:var(--ink) } .graft .g{ color:var(--gold); font-size:1.1rem; flex:0 0 auto }
  .graft .w{ color:var(--faint); font-style:italic }
  .note{ max-width:640px; margin:2.4rem auto 0; text-align:center; color:var(--faint); font-size:.9rem;
         line-height:1.7 }
  .foot{ text-align:center; margin-top:1.8rem; font-size:.72rem; color:var(--faint) }
  @media (max-width:560px){ .lbl{ font-size:11px } .lbl.small{ display:none } }
</style>

<div class="wrap">
  <div class="crown"><span class="v" id="crown">The fear of the LORD is the beginning of wisdom.</span>
    <span class="r" id="cref">Proverbs 9:10</span></div>

  <div class="stage">
    <svg id="floor" viewBox="0 0 1000 1000" role="img" aria-label="The floor of discovery, rendered as a tree"></svg>
    <div class="tip" id="tip"></div>
  </div>
  <div class="halves">
    <span><b>The created order</b> — general revelation</span>
    <span><b>The Word</b> — special revelation</span>
    <span>one floor</span>
  </div>

  <h2>Where the two trees are one</h2>
  <div class="grafts" id="grafts"></div>

  <p class="note" id="note"></p>
  <div class="foot" id="foot">A conduit, not a source · nothing is generated · <a href="/">go to the door</a></div>
</div>

<script src="/kinds.js"></script>
<script src="/nh-home.js"></script>
<script src="/nh-tools.js"></script>
<script>
(function(){
  var svg=document.getElementById('floor'), tip=document.getElementById('tip'),
      stage=document.querySelector('.stage');
  var CX=500, CY=500, RING=[0,150,268,360,430];   // radius by depth
  var SIZE=[20,12,8,5,3];                          // node radius by depth

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  fetch('/floor').then(function(r){return r.json();}).then(function(d){
    if(!d || !d.root){ document.getElementById('note').textContent='The floor is not loaded.'; return; }
    if(d.verse){ document.getElementById('crown').textContent=d.verse.text;
                 document.getElementById('cref').textContent=d.verse.ref; }
    if(d.note) document.getElementById('note').textContent=d.note;
    if(d.stats) document.getElementById('foot').innerHTML=
      esc(d.stats.seeds.toLocaleString())+' seeds · '+esc(d.stats.shelves)+
      ' domains · one floor &nbsp;·&nbsp; <a href="/">go to the door</a>';
    render(d.root);
    grafts(d.grafts||[]);
  }).catch(function(){ document.getElementById('note').textContent='The floor could not be reached.'; });

  // ── radial layout: leaves get equal angular slices; a parent centers over its children ──
  function render(root){
    var leaves=0, maxDepth=0;
    (function count(n,depth){ n._d=depth; maxDepth=Math.max(maxDepth,depth);
      if(!n.children||!n.children.length){ n._leaf=leaves++; return; }
      n.children.forEach(function(c){count(c,depth+1);}); })(root,0);
    if(leaves===0) leaves=1;
    (function ang(n){ if(!n.children||!n.children.length){ n._a=(n._leaf+0.5)/leaves*2*Math.PI; return n._a; }
      var s=0; n.children.forEach(function(c){ s+=ang(c); }); n._a=s/n.children.length; return n._a; })(root);
    function pos(n){ var r=RING[Math.min(n._d,RING.length-1)];
      n._x=CX+r*Math.cos(n._a-Math.PI/2); n._y=CY+r*Math.sin(n._a-Math.PI/2); }
    (function place(n){ pos(n); (n.children||[]).forEach(place); })(root);

    var edges='', nodes='';
    (function draw(n){
      (n.children||[]).forEach(function(c){
        // a gently curved spoke from parent to child
        var mx=(n._x+c._x)/2, my=(n._y+c._y)/2;
        edges+='<path class="edge" d="M'+n._x+' '+n._y+' Q '+mx+' '+my+' '+c._x+' '+c._y+'"/>';
        draw(c);
      });
      var cls='node'+(n._d===0?' root':(n._d<=1?' spine':(n._d===2?' spine':'')));
      var rad=SIZE[Math.min(n._d,SIZE.length-1)];
      nodes+='<g class="'+cls+'" data-t="'+esc(n.title)+'" data-c="'+(n.child_count||0)+'" '+
             'transform="translate('+n._x+','+n._y+')"><circle r="'+rad+'"></circle>';
      // name the structure — the root, the two halves, and the named spines. The leaf-seeds stay
      // quiet points of light, so the design reads at a glance instead of a wall of labels.
      if(n._d<=1 || (n._d===2 && (n.child_count||0)>0)){
        var t=n.title.split(' — ')[0].split(' (')[0];
        if(t.length>26) t=t.slice(0,25)+'…';
        var dy=(n._y<CY? -rad-8 : rad+16);
        nodes+='<text class="lbl'+(n._d===2?' small':'')+'" text-anchor="middle" y="'+dy+'">'+esc(t)+'</text>';
      }
      nodes+='</g>';
    })(root);
    svg.innerHTML=edges+nodes;

    // hover / tap → the seed's name and how many it holds
    svg.querySelectorAll('.node').forEach(function(g){
      g.addEventListener('mouseenter',function(e){ showTip(g); });
      g.addEventListener('mouseleave',function(){ tip.style.opacity=0; });
      g.addEventListener('click',function(){ showTip(g);
        var t=g.getAttribute('data-t'); if(window.__nhPalOpen){} });
    });
  }
  function showTip(g){
    var box=svg.getBoundingClientRect(), sb=stage.getBoundingClientRect();
    var m=g.getAttribute('transform').match(/translate\(([-\d.]+),([-\d.]+)\)/);
    var x=(+m[1])/1000*box.width+(box.left-sb.left), y=(+m[2])/1000*box.height+(box.top-sb.top);
    var c=+g.getAttribute('data-c');
    tip.innerHTML=esc(g.getAttribute('data-t'))+(c? ' <span style="color:#9a875f">· holds '+c+'</span>':'');
    tip.style.left=x+'px'; tip.style.top=y+'px'; tip.style.opacity=1;
  }

  function grafts(list){
    var el=document.getElementById('grafts');
    if(!list.length){ el.parentNode.style.display='none'; return; }
    el.innerHTML=list.map(function(x){
      return '<div class="graft"><span class="w">'+esc(x.scripture)+'</span>'+
             '<span class="g">⟷</span><span class="s">'+esc(x.science)+'</span></div>'; }).join('');
  }
})();
</script>
