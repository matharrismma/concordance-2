<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Narrow Highway</title>
<meta name="description" content="Bring anything — it is checked, found, and cited, never invented. Study Scripture or study for a test. Free, no account.">
<meta property="og:title" content="Narrow Highway">
<meta property="og:description" content="Bring anything — checked, found, and cited, never invented.">
<style>
  /* Materials, not pictures: walnut, honed stone, brass, marble-white paper — one warm lamp.
     The screen is an object that belongs in that room, never an illustration of it. */
  :root{
    --walnut:#2b1a10; --walnut-2:#170d07; --walnut-hi:#3b2415;
    --stone:#3a352d; --stone-hi:#4b453b; --stone-lo:#25211b;
    --slab:#6f6355; --slab-hi:#847766; --slab-lo:#514739;
    --paper:#f5f1e6; --paper-2:#e9e3d3;
    --brass:#c69a4a; --brass-hi:#eed69b; --brass-lo:#8a6a2f;
    --ink:#241c12; --ink-soft:#6b5c45; --ink-faint:#9b8a6d;
    --oxblood:#7d4a22; --parch:#ded3ba;
    --lamp:rgba(255,231,176,.30);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  a{color:inherit; text-decoration:none}
  .caps{ font-family:Futura,"Century Gothic","Avenir Next",Avenir,"Trebuchet MS",sans-serif;
         text-transform:uppercase; letter-spacing:.24em; font-weight:600 }

  /* THE BOOK. The whole screen is one leather-bound volume lying open: deep hide at the
     edges with two gilt rules pressed into it, the block of closed pages showing along the
     right, and a single paper page filling the middle where everything happens. The
     conversation is written on the page in ink; the composer is the foot of the same page.
     Chatbox in behaviour, notebook in feel, bound like something worth keeping. */
  body{
    margin:0; height:100%; font-size:17px; color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    background:
      radial-gradient(130% 100% at 50% -20%, rgba(255,214,150,.10), transparent 55%),
      radial-gradient(130% 160% at 108% 108%, rgba(0,0,0,.45), transparent 55%),
      repeating-linear-gradient(23deg, rgba(255,235,200,.018) 0 2px, transparent 2px 5px),
      repeating-linear-gradient(-31deg, rgba(0,0,0,.06) 0 1px, transparent 1px 4px),
      linear-gradient(160deg, #4a2318 0%, #38180f 45%, #240d08 100%);
    padding:1.5rem 1.7rem;
  }
  /* blind tooling: a bright rule and a faint echo, the way a binder finishes a cover */
  body::before{
    content:""; position:fixed; inset:.6rem; pointer-events:none; z-index:6;
    border:1px solid rgba(198,154,74,.45); border-radius:3px;
  }
  body::after{
    content:""; position:fixed; inset:.95rem; pointer-events:none; z-index:6;
    border:1px solid rgba(198,154,74,.15); border-radius:2px;
  }

  /* THE PAGE — paper filling the book, the closed pages stacked beneath its right edge */
  .desk{
    height:100%; overflow-y:auto; scroll-behavior:smooth; overscroll-behavior:contain;
    display:flex; flex-direction:column; align-items:center;
    padding:2.4rem 3rem 1.2rem;
    background:
      radial-gradient(70% 46% at 28% -4%, var(--lamp), transparent 65%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    border-radius:2px 5px 5px 2px;
    box-shadow:
      2.5px 2.5px 0 #e8dfc9, 5px 5px 0 #ddd3b9, 7.5px 7.5px 0 #d0c5a7,
      12px 14px 30px -8px rgba(0,0,0,.7),
      inset 0 1px 0 rgba(255,255,255,.65),
      inset 16px 0 30px -22px rgba(60,40,20,.5);
  }
  .col{ width:min(44rem,100%); display:flex; flex-direction:column; margin:auto 0 0 }
  .col.empty{ margin:auto 0 }

  /* the top edge of the page: the name and a few small doors, staying put while you scroll */
  .top{
    position:sticky; top:-2.4rem; z-index:4; align-self:stretch;
    display:flex; align-items:center; gap:1.1rem; flex-wrap:wrap;
    margin:-2.4rem -3rem 1.2rem; padding:.55rem 1.4rem .5rem;
    background:linear-gradient(180deg, var(--paper) 78%, transparent);
  }
  .top .nm{ font-size:.6rem; letter-spacing:.3em; color:var(--ink-faint) }
  .top .nm b{ font-weight:600; color:var(--brass-lo) }
  .top .gap{ flex:1 }
  .top a, .top button{
    border:0; background:none; padding:.2rem 0; cursor:pointer; font:inherit;
    font-size:.76rem; color:var(--ink-faint); transition:color .14s ease }
  .top a:hover, .top button:hover{ color:var(--ink) }

  /* what the page is carrying for you: open lists and due reminders, gone when crossed off */
  #carried{ margin:0 .2rem 1.6rem; border:1px solid rgba(138,106,47,.3); border-radius:8px;
            background:rgba(255,255,255,.4); padding:.7rem .95rem }
  #carried .cap{ font-size:.56rem; letter-spacing:.22em; text-transform:uppercase;
                 color:var(--brass-lo); margin-bottom:.35rem;
                 font-family:Futura,"Century Gothic","Avenir Next",Avenir,sans-serif }
  #carried .pin{ display:flex; gap:.6rem; align-items:flex-start; padding:.28rem 0 }
  #carried .pin+.pin{ border-top:1px solid rgba(138,106,47,.14) }
  #carried .tx{ flex:1; white-space:pre-wrap; font-size:.95rem; color:var(--ink) }
  #carried .due{ font-size:.72rem; color:var(--oxblood); white-space:nowrap; padding-top:.15rem }
  #carried .ok{ border:1px solid rgba(138,106,47,.35); background:none; border-radius:50%;
                width:22px; height:22px; min-width:22px; cursor:pointer; color:var(--ink-faint);
                font-size:.7rem; line-height:1 }
  #carried .ok:hover{ color:#4a6a34; border-color:#4a6a34 }

  /* the conversation, in ink on the page */
  #chain{ padding:0 .2rem 1.5rem }
  .turn{ margin:0 0 2rem }
  .you{ color:var(--ink); font-weight:600 }
  .said{ margin:.4rem 0 0; color:#3d3426 }
  .verdict{ font-weight:700 } .verdict.HOLDS{ color:#4a6a34 } .verdict.BROKEN{ color:#8a3b1e }
  .trail{ color:var(--ink-soft); font-size:.9rem }
  .hit{ border-top:1px solid rgba(138,106,47,.22); padding:.6rem 0 }
  .hit b{ font-weight:600; color:var(--ink) }
  .hit .sn{ display:block; color:var(--ink-soft); font-size:.9rem }
  .note{ font-size:.76rem; color:var(--ink-faint); margin-top:.6rem }
  .word{ margin:.1rem 0 .5rem }
  .word .heb{ font-size:1.5rem; color:var(--ink) }
  .word .tl{ font-style:italic; color:var(--ink-soft) }
  .word .pr{ color:var(--ink-faint) }
  .word .sg{ font-size:.72rem; color:var(--brass-lo) }
  .res a{ color:var(--oxblood) }
  .hear{ background:none; border:1px solid rgba(138,106,47,.45); color:var(--brass-lo); font:inherit;
         font-size:.82rem; cursor:pointer; padding:.42rem .85rem; line-height:1; border-radius:999px;
         min-height:40px; display:inline-flex; align-items:center; gap:.35rem; margin-top:.55rem }
  .hear:hover{ color:#fff; background:var(--brass-lo); border-color:var(--brass-lo) }

  /* THE COMPOSER — the foot of the same page, set apart by nothing louder than a rule */
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(240,232,212,.35));
    border:1px solid rgba(138,106,47,.3); border-radius:9px;
    box-shadow:0 8px 22px -14px rgba(60,40,20,.55), inset 0 1px 0 rgba(255,255,255,.75);
    overflow:hidden;
  }
  #q{ display:block; border:0; outline:0; background:transparent; color:var(--ink);
      font:inherit; font-size:1.05rem; line-height:1.75;
      padding:1.4rem 1.5rem .8rem; min-height:4.6rem; max-height:56vh; overflow-y:auto;
      transition:min-height .18s ease }
  .col.empty #q{ min-height:10rem }
  #q:empty::before{ content:attr(data-empty); color:var(--ink-faint); pointer-events:none }
  #q h2{ font-size:1.1rem; font-weight:600; margin:.9rem 0 .3rem }
  #q ul,#q ol{ margin:.4rem 0; padding-left:1.4rem }
  #q table,.you table{ border-collapse:collapse; margin:.7rem 0; width:100%; font-size:.94rem }
  #q td,#q th,.you td,.you th{ border:1px solid rgba(138,106,47,.4); padding:.35rem .5rem;
                               min-width:3rem; font-weight:400 }
  #q th,.you th{ background:rgba(198,154,74,.14); font-weight:600; text-align:left }
  #q tr[data-total] td,.you tr[data-total] td{ font-weight:600;
      border-top:2px solid rgba(138,106,47,.55); background:rgba(198,154,74,.08) }
  #q hr,.you hr{ border:0; border-top:1px solid rgba(138,106,47,.35); margin:1rem 0 }
  .you h2{ font-size:1.1rem; font-weight:600; margin:0 0 .3rem }
  .you ul,.you ol{ margin:.4rem 0; padding-left:1.4rem; font-weight:400 }

  .tools{ display:flex; align-items:flex-end; gap:.5rem; padding:.2rem .7rem .55rem }
  /* the formatting tools are secondary — small, and they scroll aside if the row is cramped so
     they never crowd out the two things a thumb reaches for */
  .fmt{ display:flex; align-items:center; gap:.05rem; flex:1 1 auto; min-width:0;
        overflow-x:auto; scrollbar-width:none }
  .fmt::-webkit-scrollbar{ display:none }
  .tools button{ min-width:26px; height:26px; padding:0 .32rem; border:0; background:none;
                 cursor:pointer; color:rgba(36,31,24,.32); font:inherit; font-size:.8rem;
                 border-radius:3px; transition:color .14s ease, background .14s ease }
  .tools button:hover{ color:var(--ink); background:rgba(138,106,47,.12) }
  .tools .inks{ display:inline-flex; align-items:center; margin-left:.3rem }
  .tools .dot{ min-width:11px; width:11px; height:11px; border-radius:50%; padding:0;
               background:var(--c); margin:0 .1rem; border:1px solid rgba(0,0,0,.14);
               opacity:.45; transition:opacity .14s ease }
  .tools .dot:hover{ opacity:1; background:var(--c) }
  .tools .dot.hi{ border-radius:2px }
  .tools button[data-intable]{ display:none; font-size:.68rem }
  .tools[data-intable="1"] button[data-intable]{ display:inline-block }
  /* the two primary actions — speak and send — are big, round, thumb-sized, always in reach */
  .acts{ display:flex; align-items:center; gap:.4rem; flex:0 0 auto }
  /* the box should feel like talking, not editing — the formatting tools stay out of the way
     until you tap ¶ or actually start writing a document (a line break, a table, or length) */
  .tools[data-fmt="0"] .fmt{ display:none }
  .tools .fmtbtn{ min-width:32px; height:32px; border-radius:50%; padding:0; align-self:center;
                  color:rgba(36,31,24,.3); font-size:1rem }
  .tools .fmtbtn:hover{ color:var(--ink); background:rgba(138,106,47,.12) }
  .tools .fmtbtn[aria-pressed="true"]{ color:var(--brass-lo); background:rgba(138,106,47,.16) }
  .tools .act{ width:46px; min-width:46px; height:46px; border-radius:50%; padding:0;
               display:inline-flex; align-items:center; justify-content:center; font-size:1.25rem;
               color:var(--brass-lo) }
  .tools #mic.act{ border:1.5px solid rgba(138,106,47,.5) }
  .tools #mic.act:hover{ background:rgba(138,106,47,.1) }
  .tools #mic.act[aria-pressed="true"]{ color:#fff; background:var(--oxblood);
               border-color:var(--oxblood); animation:micpulse 1.15s ease-in-out infinite }
  .tools #send.act{ color:#fff; background:var(--brass-lo); box-shadow:0 1px 3px rgba(0,0,0,.24) }
  .tools #send.act:hover{ background:var(--brass); color:#fff }
  .tools #send.act[data-idle="1"]{ opacity:.32 }
  @keyframes micpulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(125,42,34,.45) }
                       50%{ box-shadow:0 0 0 9px rgba(125,42,34,0) } }

  .foot{ display:flex; gap:.9rem; justify-content:center; font-size:.58rem;
         color:var(--ink-faint); opacity:.75; padding:.8rem 0 .2rem }
  .foot a{ color:var(--ink-faint) }
  .foot a:hover{ color:var(--brass-lo) }

  @media (max-width:900px){
    body{ padding:.65rem .7rem }
    body::before{ inset:.3rem } body::after{ display:none }
    .desk{ padding:1.3rem 1.05rem .8rem; border-radius:2px 4px 4px 2px;
           box-shadow:2px 2px 0 #e8dfc9, 4px 4px 0 #ddd3b9,
                      8px 9px 22px -8px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.65) }
    /* the top row was cut for the desktop page margins and spilled off a phone's edges;
       the name lives on the cover, so up here the room belongs to the doors */
    .top{ margin:-1.3rem -1.05rem .9rem; padding:.5rem .9rem .45rem; gap:.7rem; top:-1.3rem }
    .top .nm{ display:none }
    .top a,.top button{ font-size:.74rem; padding:.3rem 0; min-height:30px }
    #q{ padding:1.05rem 1rem .6rem; font-size:1rem; min-height:4rem; max-height:48vh }
    .col.empty #q{ min-height:8.5rem }
    .tools{ padding:.15rem .35rem .5rem; gap:.4rem }
    .tools button{ min-width:36px; height:42px; font-size:.9rem; padding:0 .28rem }
    .tools .dot{ min-width:20px; width:20px; height:20px; margin:0 .12rem }
    .tools .inks{ margin-left:.15rem }
    .tools .act{ width:54px; min-width:54px; height:54px; font-size:1.5rem }
    .tools .fmtbtn{ width:42px; height:42px; font-size:1.15rem }
  }
</style>
</head>
<body>

<div class="desk" id="desk">
  <nav class="top" aria-label="Navigate">
    <span class="caps nm">Narrow <b>Highway</b></span>
    <span class="gap"></span>
    <button id="newbtn" type="button">New</button>
    <a href="/bible.html">Scripture</a>
    <a href="/read.html">Study</a>
    <a href="/steward.html">Steward</a>
    <a href="/journal.html">Journal</a>
    <a href="/days.html">Days</a>
    <button id="doors" type="button" title="Everything (Ctrl-K)" aria-label="Everything">&#8943;</button>
  </nav>
  <div class="col empty" id="col">

    <div id="carried" hidden></div>

    <div id="chain"></div>

    <div class="card">
      <div id="q" contenteditable="true" role="textbox" aria-multiline="true"
           aria-label="Bring anything" data-empty="Write here…"></div>
      <div class="tools" role="toolbar" aria-label="Tools" data-intable="0" data-fmt="0">
        <div class="fmt">
          <button data-do="bold" title="Bold"><b>B</b></button>
          <button data-do="italic" title="Italic"><i>I</i></button>
          <button data-do="head" title="Heading">H</button>
          <button data-do="list" title="List">&bull;</button>
          <button data-ins="table" title="Table">&#9638;</button>
          <button data-ins="row" title="Add row" data-intable="1">+row</button>
          <button data-ins="col" title="Add column" data-intable="1">+col</button>
          <button data-ins="sum" title="Total the columns" data-intable="1">&Sigma;</button>
          <span class="inks">
            <button data-ink="#241f18" class="dot" style="--c:#241f18" title="Ink"></button>
            <button data-ink="#7d4a22" class="dot" style="--c:#7d4a22" title="Red"></button>
            <button data-ink="#3d5a6c" class="dot" style="--c:#3d5a6c" title="Blue"></button>
            <button data-mark="1" class="dot hi" style="--c:#f2e08a" title="Highlight"></button>
          </span>
        </div>
        <div class="acts">
          <button id="fmtoggle" type="button" class="fmtbtn" aria-pressed="false"
                  aria-label="Text tools" title="Text tools">&para;</button>
          <button id="mic" type="button" class="act" aria-pressed="false"
                  aria-label="Speak your words" title="Speak" hidden>&#127908;</button>
          <button id="send" type="button" class="act send" aria-label="Send"
                  title="Send" data-idle="1">&#8593;</button>
        </div>
      </div>
    </div>

    <div class="foot">
      <span id="found">A conduit, not a source · nothing is generated</span>
      <a href="https://narrowhighway.org">the witness</a>
      <span hidden>narrowing the possibilities</span>
    </div>

  </div>
</div>

<script src="/kinds.js"></script>
<script src="/speak.js"></script>
<script src="/redact.js"></script>
<script src="/nh-tools.js"></script>
<script>
(function(){
  var API='', TID='nh_tid', ROSTER='nh_ask_roster';
  var ta=document.getElementById('q'), send=document.getElementById('send'), mic=document.getElementById('mic');
  var chain=document.getElementById('chain'), desk=document.getElementById('desk'),
      col=document.getElementById('col');
  var threadId=null; try{ threadId=localStorage.getItem(TID)||null; }catch(e){}

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function fit(){}                       // a contenteditable grows on its own
  function said(){ return (ta.innerText||'').replace(/ /g,' ').trim(); }
  function scroll(){ requestAnimationFrame(function(){ desk.scrollTop=desk.scrollHeight; }); }
  // the card sits in the middle of an empty field until the conversation gives it a reason
  // to settle at the bottom
  function settle(){ col.classList.toggle('empty', !chain.firstChild); }

  function render(d,isDoc){
    var h='';
    if(d.message) h += '<div>'+esc(d.message)+'</div>';
    // the tortoise: a finding from primary / high-quality open sources, run through our checks
    if(d.web){
      var wa=d.web.answer;
      if(wa){
        h += '<div class="hit"><b><a href="'+esc(wa.url)+'" target="_blank" rel="noopener">'+
             esc(wa.title)+'</a></b><span class="sn">'+esc((wa.extract||'').slice(0,600))+'</span></div>';
        h += '<div class="note">'+esc(wa.source)+' · '+esc(wa.license)+
             ' · an open source, not our verified keeping</div>';
      }
      if(d.web.framed) h += '<div class="note"><b>'+esc(d.web.framed)+'</b></div>';
      if(d.web.documents && d.web.documents.length)
        h += '<div class="res"><div class="note" style="margin:.3rem 0 .15rem">'+
             'Primary documents — Library of Congress:</div>'+
             d.web.documents.map(function(x){
               return '<div class="hit"><a href="'+esc(x.url)+'" target="_blank" rel="noopener">'+
                      esc(x.title)+'</a>'+(x.format?'<span class="sn">'+esc(x.format)+'</span>':'')+
                      '</div>'; }).join('')+'</div>';
    }
    if(d.verify){
      var v=d.verify;
      h += '<div><span class="verdict '+esc(v.verdict)+'">'+esc(v.verdict)+'</span>'+
           (v.steps!=null?' <span class="trail">· '+esc(v.confirmed_steps)+'/'+esc(v.steps)+' confirmed</span>':'')+'</div>';
      if(v.trail && v.trail.length)
        h += '<div class="trail">'+v.trail.slice(0,4).map(function(t){
          return esc(t.domain||'')+(t.note?' — '+esc(t.note):''); }).join('<br>')+'</div>';
    }
    // checking is not a button — if the words carried a checkable claim, it was already checked
    var checked = d.audit && d.audit.results && d.audit.results.length;
    if(checked){
      h += d.audit.results.map(function(a){
        var ok = a.status==='CONFIRMED';
        return '<div class="hit"><span class="verdict '+(ok?'HOLDS':'BROKEN')+'">'+
               (ok?'holds':'broken')+'</span> '+esc(a.claim)+
               '<span class="sn">'+esc(a.detail||'')+'</span></div>'; }).join('');
      // the boundary still has to be visible — but as one short line, not a paragraph
      h += '<div class="note">only the claim'+(d.audit.results.length>1?'s':'')+' above '+
           (d.audit.results.length>1?'were':'was')+' checked</div>';
    }
    // A word study: the word itself, how it sounds, what it means, and how often it is used.
    // This had no renderer at all — it only ever showed the standing note, so removing that
    // note left every Hebrew and Greek lookup blank on screen.
    if(d.word_study && d.word_study.word){
      var w=d.word_study, def=(w.definition&&(w.definition.strongs_def||w.definition.kjv_def))||'';
      h += '<div class="word"><span class="heb">'+esc(w.word)+'</span> '+
           '<span class="tl">'+esc(w.transliteration||'')+'</span>'+
           (w.pronunciation?' <span class="pr">'+esc(w.pronunciation)+'</span>':'')+
           ' <span class="sg">'+esc(w.strongs||'')+'</span></div>';
      if(def) h += '<div class="said">'+esc(def)+'</div>';
      if(w.derivation) h += '<div class="trail">'+esc(w.derivation)+'</div>';
      if(w.occurrence_count) h += '<div class="note">used in '+esc(w.occurrence_count)+' verses</div>';
      if(w.verses && w.verses.length)
        h += w.verses.slice(0,3).map(function(v){
          return '<div class="hit"><b>'+esc(v.ref||'')+'</b><span class="sn">'+
                 esc((v.web_text||'').slice(0,190))+'</span></div>'; }).join('');
    }
    if(d.resources && d.resources.length)
      h += '<div class="res">'+d.resources.map(function(r){
        return r.ref ? '<div class="hit"><a href="'+esc(r.ref)+'">'+esc(r.label)+'</a></div>'
                     : '<div class="hit">'+esc(r.label)+'</div>'; }).join('')+'</div>';
    if(d.scripture && d.scripture.length)
      h += d.scripture.map(function(s){
        return '<div class="hit"><b>'+esc(s.ref||s.title||'')+'</b><span class="sn">'+esc(s.text||s.snippet||'')+'</span></div>'; }).join('');
    // real people, first — the word comes, then the tool points beyond itself (a window, not a wall)
    if(d.real_help && d.real_help.length)
      h += '<div class="res"><div class="note" style="margin:.35rem 0 .15rem">'+
           'You don’t have to carry it alone — reach for real people:</div>'+
           d.real_help.map(function(x){ return '<div class="hit">'+esc(x)+'</div>'; }).join('')+'</div>';
    // the study, when it was asked for: a public-domain commentator in his own words,
    // and where Scripture itself speaks to the same thing — found and attributed
    if(d.commentary && d.commentary.text)
      h += '<div class="hit"><b>'+esc(d.commentary.attribution||'Commentary')+'</b>'+
           '<span class="sn">'+esc(d.commentary.text)+'</span></div>';
    if(d.cross_refs && d.cross_refs.length)
      h += '<div class="hit"><b>Scripture speaks to it elsewhere</b>'+
           d.cross_refs.map(function(c){
             return '<span class="sn"><b>'+esc(c.ref)+'</b> — '+esc(c.text)+'</span>'; }).join('')+
           '</div>';
    // when the claim was checked, the check IS the answer — a fuzzy keyword match is not.
    // And a DOCUMENT is not a question: sending a fence quote once dumped six "gate" keyword
    // hits under it because one row said "Gate latch". Writing is kept, not answered.
    if(d.results && d.results.length && !checked && !isDoc)
      h += d.results.slice(0,6).map(function(r){
        return '<div class="hit"><b><a href="/card.html?id='+encodeURIComponent(r.id)+'">'+esc(r.title)+'</a></b>'+
               '<span class="sn">'+esc((r.snippet||'').slice(0,180))+'</span></div>'; }).join('');
    // the connected cloud — the keeping's strength: who else in the tradition speaks to this
    if(d.cloud && d.cloud.witnesses && d.cloud.witnesses.length)
      h += '<div class="hit"><b>Connected in the keeping</b>'+
           d.cloud.witnesses.map(function(w){
             return '<span class="sn"><a href="/card.html?id='+encodeURIComponent(w.id)+'">'+
                    esc(w.title)+'</a>'+(w.shares?' — '+esc(w.shares):'')+'</span>'; }).join('')+
           '</div>';

    var spoken=d.message||'';
    if(!spoken && d.verify) spoken='The verdict is '+(d.verify.verdict||'')+'.';
    if(!spoken && d.scripture && d.scripture[0]) spoken=(d.scripture[0].ref||'')+'. '+(d.scripture[0].text||'');
    if(!spoken && d.results && d.results[0]) spoken=d.results[0].title+'. '+(d.results[0].snippet||'');
    // never return an empty answer silently — a blank turn looks like a failure and hides one
    if(!h) h = isDoc
      ? '<div class="note">Kept. It is in the record and the journal.</div>'
      : '<div class="note">Nothing came back for that. Try naming a verse, a word, or a '+
        'claim to check.</div>';
    if(spoken && window.NHSpeak && NHSpeak.available)
      h += '<button class="hear" data-hear="'+esc(spoken.slice(0,600))+'" '+
           'aria-label="Hear this aloud" title="Hear this">&#128266; Hear it</button>';
    return h;
  }

  function rosterPut(id,title){
    if(!id) return;
    try{ var l=JSON.parse(localStorage.getItem(ROSTER)||'[]').filter(function(t){return t.thread_id!==id;});
      l.unshift({thread_id:id,title:(title||'').slice(0,80),at:Date.now()});
      localStorage.setItem(ROSTER,JSON.stringify(l.slice(0,50))); }catch(e){}
  }

  async function ask(){
    var text=said(); if(!text) return;
    var isDoc=!!ta.querySelector('table,h2');   // formatted writing, not a question
    var docHtml=isDoc?ta.innerHTML:null;
    ta.innerHTML=''; idle();
    var turn=document.createElement('div'); turn.className='turn';
    turn.innerHTML='<div class="you"></div><div class="said"><span class="note">…</span></div>';
    if(docHtml) turn.querySelector('.you').innerHTML=docHtml;
    else turn.querySelector('.you').textContent=text;
    chain.appendChild(turn); settle(); scroll();
    var body=turn.querySelector('.said');
    try{
      var clean=(window.Rampart?Rampart.protect(text).clean:text);   // PII stripped on the device
      var payload={text:clean}; if(threadId) payload.thread_id=threadId;
      var r=await fetch(API+'/ask',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
      var d=await r.json();
      if(d.thread_id){ threadId=d.thread_id; try{ localStorage.setItem(TID,threadId);}catch(e){} rosterPut(threadId,text); }
      body.innerHTML=render(d,isDoc); settle(); scroll(); ta.focus();
      if(d.pin) loadPins();
    }catch(e){ body.innerHTML='<span class="note">The engine is unreachable right now.</span>'; }
  }

  function idle(){ send.setAttribute('data-idle', said() ? '0' : '1'); }
  ta.addEventListener('input',idle); idle();
  function inTable(){
    var s=window.getSelection(); if(!s||!s.rangeCount) return false;
    var n=s.getRangeAt(0).startContainer;
    while(n && n!==ta){ if(n.nodeName==='TD'||n.nodeName==='TH') return true; n=n.parentNode; }
    return false;
  }
  ta.addEventListener('keydown',function(e){
    // Enter sends, as it always has. Inside a table it is a line break — a table is a place
    // you are still building, not a message you are finishing.
    if(e.key==='Enter' && !e.shiftKey && !inTable()){ e.preventDefault(); ask(); }
  });
  // pasted text arrives as text: a paste carrying someone else's stylesheet is not writing
  ta.addEventListener('paste',function(e){
    e.preventDefault();
    var t=(e.clipboardData||window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, t);
  });
  send.addEventListener('click',ask);
  chain.addEventListener('click',function(e){
    var h=e.target.closest('.hear'); if(h&&window.NHSpeak) NHSpeak.play(h.dataset.hear); });
  // ── the document tools, at the pad's edge ─────────────────────────────────────────────
  // execCommand is deprecated and still the only formatting API every browser implements
  // without a library. A library means a download, and a download means the page stops
  // working offline — so it stays.
  var tools=document.querySelector('.tools'), lastRange=null;
  // formatting stays hidden until you tap ¶ or the writing becomes a document (a line break, a
  // table, or real length) — so the default is a box for talking, not an editor
  var tog=document.getElementById('fmtoggle');
  function showFmt(on){ tools.setAttribute('data-fmt', on?'1':'0');
    if(tog) tog.setAttribute('aria-pressed', on?'true':'false'); }
  function maybeDoc(){ var s=said();
    if(s.indexOf('\n')>=0 || s.length>140 || (ta.querySelector&&ta.querySelector('table'))) showFmt(true); }
  if(tog) tog.addEventListener('click',function(){ showFmt(tools.getAttribute('data-fmt')!=='1'); });
  ta.addEventListener('input', maybeDoc);

  function inTag(tag){
    var sel=window.getSelection(); if(!sel||!sel.rangeCount) return null;
    var n=sel.getRangeAt(0).startContainer;
    while(n && n!==ta){ if(n.nodeName===tag) return n; n=n.parentNode; }
    return null;
  }
  function inTable(){ return !!(inTag('TD')||inTag('TH')); }

  // remember the caret: clicking a control takes focus off the paper
  document.addEventListener('selectionchange',function(){
    var sel=window.getSelection();
    if(sel && sel.rangeCount && ta.contains(sel.anchorNode)){
      lastRange=sel.getRangeAt(0).cloneRange();
      tools.setAttribute('data-intable', inTable() ? '1' : '0');
    }
  });
  function restore(){
    ta.focus();
    if(!lastRange) return;
    var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(lastRange);
  }
  function cells(n,tag){ var o=''; for(var i=0;i<n;i++) o+='<'+tag+'><br></'+tag+'>'; return o; }

  tools.addEventListener('mousedown',function(e){
    if(e.target.closest('button')) e.preventDefault();      // never steal the caret
  });
  tools.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b || b.id==='send' || b.id==='mic') return;
    var d=b.dataset;
    restore();
    if(d.do==='bold') document.execCommand('bold');
    else if(d.do==='italic') document.execCommand('italic');
    else if(d.do==='head') document.execCommand('formatBlock',false,'h2');
    else if(d.do==='list') document.execCommand('insertUnorderedList');
    else if(d.ink) document.execCommand('foreColor',false,d.ink);
    else if(d.mark) document.execCommand('hiliteColor',false,'#f2e08a');
    else if(d.ins){
      // an insert lands AFTER what you have, never over it — insertHTML replaces a live
      // selection, which once swallowed a heading whole
      var sel=window.getSelection();
      if(sel.rangeCount && !sel.isCollapsed) sel.collapseToEnd();
      if(d.ins==='table'){
        document.execCommand('insertHTML',false,
          '<table><thead><tr>'+cells(3,'th')+'</tr></thead><tbody>'+
          '<tr>'+cells(3,'td')+'</tr><tr>'+cells(3,'td')+'</tr></tbody></table><p><br></p>');
      } else if(d.ins==='row'){
        var tr=inTag('TR');
        if(tr){ var r=document.createElement('tr');
                r.innerHTML=cells(tr.children.length,'td');
                tr.parentNode.insertBefore(r,tr.nextSibling); }
      } else if(d.ins==='col'){
        var t=inTag('TABLE');
        if(t) [].forEach.call(t.rows,function(r){
          var c=document.createElement(r.parentNode.nodeName==='THEAD'?'th':'td');
          c.innerHTML='<br>'; r.appendChild(c); });
      } else if(d.ins==='sum'){
        // the Excel that matters most: total the numeric columns, deterministically. Sums are
        // carried in integer minor units (cents) so 0.10 + 0.20 is 0.30, never 0.30000000004 —
        // this page checks other people's arithmetic and must not fumble its own.
        var tb=inTag('TABLE');
        if(tb){
          var oldrow=tb.querySelector('tr[data-total]');
          if(oldrow) oldrow.parentNode.removeChild(oldrow);
          var body=tb.tBodies[0]||tb, rows=[].slice.call(body.rows), ncols=0;
          rows.forEach(function(r){ ncols=Math.max(ncols,r.cells.length); });
          var NUM=/^([$€£]?)\s*(-?\d+(?:\.\d+)?)$/;
          var tr=document.createElement('tr'); tr.setAttribute('data-total','1');
          for(var c=0;c<ncols;c++){
            var vals=[],pre='',dec=0;
            rows.forEach(function(r){
              var cell=r.cells[c]; if(!cell) return;
              var m=(cell.textContent||'').trim().replace(/,/g,'').match(NUM);
              if(m){ vals.push(m[2]); pre=pre||m[1];
                     dec=Math.max(dec,(m[2].split('.')[1]||'').length); }
            });
            var td=document.createElement('td');
            if(vals.length){
              var scale=Math.pow(10,dec);
              var total=vals.reduce(function(a,v){ return a+Math.round(parseFloat(v)*scale); },0);
              td.textContent=pre+(total/scale).toFixed(dec);
            } else if(c===0){ td.textContent='Total'; }
            tr.appendChild(td);
          }
          body.appendChild(tr);
        }
      }
    }
    idle();
  });

  // Everything that is not this page lives behind one control — the same list Ctrl-K opens.
  document.getElementById('doors').addEventListener('click',function(){
    document.dispatchEvent(new KeyboardEvent('keydown',{key:'k',ctrlKey:true,bubbles:true}));
  });
  document.getElementById('newbtn').addEventListener('click',function(){
    threadId=null; try{ localStorage.removeItem(TID);}catch(e){}
    chain.innerHTML=''; ta.innerHTML=''; idle(); showFmt(false); settle(); ta.focus(); });
  // the carried strip: what your pages are holding for you, out on the table at open
  var carried=document.getElementById('carried');
  function heldIds(){
    var ids=[];
    try{
      ids=(JSON.parse(localStorage.getItem(ROSTER)||'[]')||[]).map(function(t){return t.thread_id;});
      if(threadId && ids.indexOf(threadId)<0) ids.unshift(threadId);
    }catch(e){}
    return ids.filter(Boolean);
  }
  function fmtDue(d){
    if(!d) return '';
    var dt=new Date(d*1000), now=new Date();
    var days=Math.round((dt-now)/86400000);
    if(days<=0) return 'today';
    if(days===1) return 'tomorrow';
    return dt.toLocaleDateString(undefined,{weekday:'short'});
  }
  function drawPins(list){
    list=(list||[]).filter(function(p){return !p.waiting;});
    if(!list.length){ carried.hidden=true; carried.innerHTML=''; return; }
    carried.hidden=false;
    carried.innerHTML='<div class="cap">Carried</div>'+list.map(function(p){
      return '<div class="pin" data-t="'+esc(p.thread_id)+'" data-i="'+esc(p.id)+'">'+
        '<button class="ok" title="Cross it off" aria-label="Cross it off">✓</button>'+
        '<div class="tx">'+esc(p.text)+'</div>'+
        (p.due?'<div class="due">'+esc(fmtDue(p.due))+'</div>':'')+'</div>'; }).join('');
  }
  function loadPins(){
    var ids=heldIds(); if(!ids.length){ drawPins([]); return; }
    fetch('/pins',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({thread_ids:ids})})
      .then(function(r){return r.json();})
      .then(function(d){ drawPins(d.pins||[]); }).catch(function(){});
  }
  carried.addEventListener('click',function(e){
    var b=e.target.closest('.ok'); if(!b) return;
    var el=b.closest('.pin');
    fetch('/pins/done',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({thread_id:el.dataset.t,id:el.dataset.i})})
      .then(function(){ loadPins(); });
  });
  loadPins();

  desk.addEventListener('click',function(e){
    if(e.target===desk||e.target===col||e.target===chain) ta.focus(); });

  try{
    if(/(^|\.)narrowhighway\.org$/i.test(location.hostname)){
      var f=document.getElementById('found');
      if(f) f.textContent='A conduit, not a source · the wisdom is in Christ, not this tool';
    }
  }catch(e){}

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    mic.hidden=false;
    var rec=new SR(); rec.lang='en-US'; rec.interimResults=true; rec.continuous=false;
    var listening=false, base='';
    rec.onresult=function(ev){ var s='';
      for(var i=ev.resultIndex;i<ev.results.length;i++) s+=ev.results[i][0].transcript;
      ta.textContent=(base?base+' ':'')+s; idle(); };
    rec.onend=rec.onerror=function(){ listening=false; mic.setAttribute('aria-pressed','false'); };
    mic.addEventListener('click',function(){
      if(listening){ rec.stop(); return; }
      base=said(); listening=true; mic.setAttribute('aria-pressed','true');
      try{ rec.start(); }catch(e){ listening=false; mic.setAttribute('aria-pressed','false'); } });
  }
})();
</script>
</body>
