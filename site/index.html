<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Narrow Highway</title>
<meta name="description" content="Bring anything — it is checked, found, and cited, never invented. Study Scripture or study for a test. Free, no account.">
<meta property="og:title" content="Narrow Highway">
<meta property="og:description" content="Bring anything — checked, found, and cited, never invented.">
<style>
  /* Materials, not pictures: walnut, honed stone, brass, marble-white paper — one warm lamp.
     The screen is an object that belongs in that room, never an illustration of it. */
  :root{
    --walnut:#2b1a10; --walnut-2:#170d07; --walnut-hi:#3b2415;
    --stone:#3a352d; --stone-hi:#4b453b; --stone-lo:#25211b;
    --slab:#6f6355; --slab-hi:#847766; --slab-lo:#514739;
    --paper:#f5f1e6; --paper-2:#e9e3d3;
    --brass:#c69a4a; --brass-hi:#eed69b; --brass-lo:#8a6a2f;
    --ink:#241c12; --ink-soft:#6b5c45; --ink-faint:#9b8a6d;
    --oxblood:#7d4a22;
    --lamp:rgba(255,231,176,.30);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; color:var(--ink); font-size:17px;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    background:
      radial-gradient(120% 90% at 50% -20%, rgba(255,225,170,.10), transparent 60%),
      repeating-linear-gradient(90deg, rgba(0,0,0,.22) 0 1px, transparent 1px 172px),
      repeating-linear-gradient(90deg, rgba(255,220,170,.028) 0 2px, transparent 2px 9px),
      linear-gradient(180deg, var(--walnut-hi) 0%, var(--walnut) 42%, var(--walnut-2) 100%),
      var(--walnut-2);
    display:flex; height:100%; overflow:hidden;
  }
  a{color:inherit; text-decoration:none}
  .caps{ font-family:Futura,"Century Gothic","Avenir Next",Avenir,"Trebuchet MS",sans-serif;
         text-transform:uppercase; letter-spacing:.24em; font-weight:600 }

  /* THE DESK: the pad sits in the middle, the tools are laid out around it — the way things
     sit around a blotter. Nothing flanks the paper on a phone; there the pad IS the screen and
     the tools fall below it, all of them reachable, none hidden behind a sideways scroll. */
  body{
    margin:0; color:var(--ink); font-size:17px; min-height:100%;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    background:
      radial-gradient(120% 90% at 50% -20%, rgba(255,225,170,.10), transparent 60%),
      repeating-linear-gradient(90deg, rgba(0,0,0,.22) 0 1px, transparent 1px 172px),
      repeating-linear-gradient(90deg, rgba(255,220,170,.028) 0 2px, transparent 2px 9px),
      linear-gradient(180deg, var(--walnut-hi) 0%, var(--walnut) 42%, var(--walnut-2) 100%),
      var(--walnut-2);
  }
  .desk{
    min-height:100vh; min-height:100svh;
    display:grid; gap:.7rem 1.5rem;
    grid-template-columns:minmax(10.5rem,1fr) minmax(0,50rem) minmax(10.5rem,1fr);
    grid-template-rows:auto minmax(0,1fr) auto;
    grid-template-areas:
      "plate plate plate"
      "left  pad   right"
      "foot  foot  foot";
    padding:1rem 1.3rem 1.1rem;
  }

  .plate{ grid-area:plate; display:flex; align-items:center; justify-content:center; gap:1rem;
          padding:.2rem 0 .5rem; position:relative }
  .plate .n{ font-size:.54rem; color:rgba(238,214,155,.4) }
  .plate .h{ font-size:.78rem; color:rgba(238,214,155,.68); letter-spacing:.3em }
  .plate .new{ width:auto; position:absolute; right:.3rem; top:.15rem; color:#cbbc9d;
               padding:.3rem .2rem; font-size:.84rem }

  /* the margins: grouped, right-aligned into the pad on the left, left-aligned on the right,
     so both clusters read as things placed beside the paper rather than a menu bar */
  .side{ display:flex; flex-direction:column; gap:1px; align-content:start }
  .side.left{ grid-area:left; align-items:stretch }
  .side.right{ grid-area:right; align-items:stretch }
  .t.rule{ margin-top:1.1rem; padding-top:1.1rem; position:relative }
  .t.rule::before{ content:""; position:absolute; top:0; left:0; width:2.2rem; height:1px;
                   background:rgba(198,154,74,.45) }
  .t{ display:block; padding:.28rem 0; font-size:.8rem; color:#a4937a; border:0;
      background:none; cursor:pointer; font-family:inherit; width:100%; text-align:left;
      line-height:1.3; transition:color .14s ease }
  .t:hover{ color:#fff6e2 }

  /* the pad itself */
  .pad{
    grid-area:pad; position:relative; min-height:0; display:flex; padding:11px;
    background:
      linear-gradient(101deg, transparent 33%, rgba(255,250,235,.055) 34.5%, transparent 36%),
      linear-gradient(99deg, transparent 63%, rgba(255,250,235,.04) 64%, transparent 65.5%),
      linear-gradient(180deg, var(--slab-hi) 0%, var(--slab) 58%, var(--slab-lo) 100%);
    box-shadow:0 30px 70px -30px #000, 0 6px 18px -10px rgba(0,0,0,.8),
               inset 0 1px 0 rgba(255,240,200,.10);
    border-radius:3px;
  }
  .pad::before{
    content:""; position:absolute; inset:5px; pointer-events:none; border-radius:2px;
    border:1px solid rgba(198,154,74,.55);
    -webkit-mask:linear-gradient(#000 0 0) top left/24px 24px no-repeat,
                 linear-gradient(#000 0 0) top right/24px 24px no-repeat,
                 linear-gradient(#000 0 0) bottom left/24px 24px no-repeat,
                 linear-gradient(#000 0 0) bottom right/24px 24px no-repeat;
            mask:linear-gradient(#000 0 0) top left/24px 24px no-repeat,
                 linear-gradient(#000 0 0) top right/24px 24px no-repeat,
                 linear-gradient(#000 0 0) bottom left/24px 24px no-repeat,
                 linear-gradient(#000 0 0) bottom right/24px 24px no-repeat;
  }
  /* the paper fills the pad. It used to be sized by its content while the pad kept a tall
     min-height, which left a bare slab under a small sheet on a phone. */
  .surface{
    flex:1 1 auto; min-height:0; overflow-y:auto; overscroll-behavior:contain;
    scroll-behavior:smooth; padding:1.9rem 2rem 3.2rem;
    background:
      radial-gradient(64% 44% at 26% -4%, var(--lamp), transparent 66%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    box-shadow:0 2px 10px -3px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.55);
    border-radius:1px;
  }

  .foot{ grid-area:foot; display:flex; flex-wrap:wrap; gap:.2rem .9rem; justify-content:center;
         font-size:.62rem; color:rgba(232,220,192,.3); padding-top:.6rem }
  .foot a{ color:rgba(232,220,192,.45); border-bottom:1px solid rgba(198,154,74,.22) }
  .foot a:hover{ color:var(--brass-hi) }
  .foot .k{ color:rgba(232,220,192,.2) }

  .turn{ margin:0 0 1.5rem }
  .you{ font-weight:600 }
  .you::before{ content:"⁂  "; color:var(--brass-lo); font-weight:400 }
  .said{ margin:.35rem 0 0 }
  .verdict{ font-weight:700 } .verdict.HOLDS{ color:#4a6a34 } .verdict.BROKEN{ color:var(--oxblood) }
  .trail{ color:var(--ink-soft); font-size:.9rem }
  .hit{ border-top:1px solid rgba(138,106,47,.22); padding:.55rem 0 }
  .hit b{ font-weight:600 } .hit .sn{ display:block; color:var(--ink-soft); font-size:.9rem }
  .note{ font-size:.74rem; color:var(--ink-faint); margin-top:.6rem }
  .res a{ color:var(--oxblood) }
  .hear{ background:none; border:0; color:var(--ink-faint); font:inherit; font-size:1rem;
         cursor:pointer; padding:.2rem .4rem 0 0; line-height:1 }
  .hear:hover{ color:var(--brass-lo) }

  /* the box IS the page — a caret on paper, no field, no border */
  /* the paper you can actually write on: bold, colour, lists, tables — the document tools,
     not another row of navigation. Nothing shows until you select something. */
  #q{ display:block; width:100%; border:0; outline:0; background:transparent;
      color:var(--ink); font:inherit; font-size:1.06rem; line-height:1.8; padding:0;
      min-height:1.8em }
  #q:empty::before{ content:attr(data-empty); color:var(--ink-faint); pointer-events:none }
  #q h2{ font-size:1.12rem; font-weight:600; margin:1.1rem 0 .3rem }
  #q ul,#q ol{ margin:.4rem 0; padding-left:1.4rem }
  #q table{ border-collapse:collapse; margin:.8rem 0; width:100%; font-size:.95rem }
  #q td,#q th{ border:1px solid rgba(138,106,47,.4); padding:.4rem .55rem; min-width:3rem }
  #q th{ background:rgba(198,154,74,.14); font-weight:600; text-align:left }
  #q hr{ border:0; border-top:1px solid rgba(138,106,47,.35); margin:1.1rem 0 }

  /* the format bar: only ever on screen while text is selected */
  .mark{ position:absolute; z-index:40; display:flex; align-items:center; gap:.1rem;
         padding:.25rem .3rem; border-radius:3px; background:#2b2620;
         box-shadow:0 8px 22px -8px rgba(0,0,0,.8); border:1px solid rgba(198,154,74,.3) }
  .mark[hidden]{ display:none }
  .mark button{ min-width:26px; height:26px; border:0; background:none; color:#e3d8bd;
                font:inherit; font-size:.86rem; cursor:pointer; border-radius:2px; padding:0 .3rem }
  .mark button:hover{ background:rgba(198,154,74,.28); color:#fff6e2 }
  .mark .sep{ width:1px; height:16px; background:rgba(198,154,74,.3); margin:0 .25rem }
  .mark .dot{ min-width:16px; width:16px; height:16px; border-radius:50%; padding:0;
              background:var(--c); margin:0 .1rem; border:1px solid rgba(255,255,255,.22) }
  .mark .dot:hover{ background:var(--c); filter:brightness(1.2) }
  .mark .dot.hi{ border-radius:2px }

  /* the insert menu, opened from one small fitting */
  .ins{ position:absolute; right:26px; bottom:58px; z-index:35; display:flex;
        flex-direction:column; min-width:9rem; padding:.25rem; border-radius:3px;
        background:#2b2620; border:1px solid rgba(198,154,74,.3);
        box-shadow:0 10px 26px -10px rgba(0,0,0,.8) }
  .ins[hidden]{ display:none }
  .ins button{ border:0; background:none; color:#e3d8bd; font:inherit; font-size:.86rem;
               text-align:left; padding:.4rem .55rem; cursor:pointer; border-radius:2px }
  .ins button:hover{ background:rgba(198,154,74,.28); color:#fff6e2 }

  /* brass fittings */
  .pen{ position:absolute; right:26px; bottom:20px; display:flex; gap:.25rem; align-items:center }
  .pen button{
    width:28px; height:28px; cursor:pointer; font-size:.78rem; line-height:1; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center; color:#6b5c45;
    background:none; border:1px solid rgba(138,106,47,.35);
    transition:color .15s ease, border-color .15s ease, background .15s ease, opacity .18s ease }
  .pen button:hover{ color:#3d2f14; border-color:var(--brass-lo); background:rgba(198,154,74,.14) }
  /* the send fitting does not exist until there is something to send */
  #send[data-idle="1"]{ opacity:0; pointer-events:none }
  .pen button[aria-pressed="true"]{ background:linear-gradient(180deg,#e0a08c,var(--oxblood)); color:#fff }
  .pen button[hidden]{ display:none }

  /* Narrower than a desk, the same arrangement stands on end: the paper still sits in the
     middle with tools above it and below it. Every tool is visible and a fingertip wide —
     three of twelve used to be reachable, the rest hidden behind a sideways scroll. */
  @media (max-width:900px){
    .desk{
      grid-template-columns:1fr;
      grid-template-rows:auto auto auto auto auto;
      grid-template-areas:"plate" "left" "pad" "right" "foot";
      gap:.3rem; padding:.7rem .95rem 1.2rem;
    }
    .plate{ justify-content:flex-start; padding-bottom:.25rem }
    .plate .new{ position:static; margin-left:auto }
    .pad{ min-height:52svh; padding:8px }
    .surface{ padding:1.3rem 1.15rem 3.6rem }
    .side{ display:grid; gap:0 1.1rem; margin:0;
           grid-template-columns:repeat(auto-fit,minmax(8.5rem,1fr)) }
    .side h2{ grid-column:1/-1; margin:.5rem 0 .1rem }
    .side h2:first-child{ margin-top:.2rem }
    .t{ padding:.5rem 0; min-height:44px; font-size:.84rem; display:flex; align-items:center }
    /* a group break has to start a row, or the two columns interleave the groups and the
       hairline ends up marking one cell instead of a division */
    .t.rule{ grid-column:1; margin-top:.5rem; padding-top:.85rem }
    .foot{ justify-content:flex-start; margin-top:.4rem }
    .pen{ right:20px; bottom:20px }
  }
  /* a phone held in one hand: two tools to a row, never one long column */
  @media (max-width:400px){
    .side{ grid-template-columns:repeat(2,1fr) }
    .t{ font-size:.84rem; padding:.6rem .55rem }
  }
</style>
</head>
<body>

<div class="desk">

  <div class="plate">
    <span class="caps n">Narrow</span> <span class="caps h">Highway</span>
    <button class="t new" id="newbtn" type="button">New page</button>
  </div>

  <!-- left of the pad -->
  <nav class="side left" aria-label="Study and look">
    <a class="t" href="/bible.html">Scripture</a>
    <a class="t" href="/read.html">Study for a test</a>
    <a class="t" href="/characters.html">Dictionary</a>
    <a class="t rule" href="/library.html">The keeping</a>
    <a class="t" href="/almanac.html">Almanac</a>
    <a class="t" href="/map.html">The map</a>
    <a class="t" href="/brain.html">The brain</a>
  </nav>

  <!-- the pad: paper at the centre of the desk -->
  <div class="pad">
    <div class="surface" id="surface">
      <div id="chain"></div>
      <div id="q" contenteditable="true" role="textbox" aria-multiline="true"
           aria-label="Bring anything" data-empty="Write here…"></div>
    </div>
    <div class="ins" id="insmenu" hidden>
      <button data-ins="table">Table</button>
      <button data-ins="row">Add row</button>
      <button data-ins="col">Add column</button>
      <button data-ins="rule">Divider</button>
    </div>
    <div class="pen">
      <button id="plus" type="button" aria-label="Insert" title="Insert" aria-expanded="false">+</button>
      <button id="mic" type="button" aria-pressed="false" aria-label="Speak" title="Speak" hidden>🎤</button>
      <button id="send" type="button" aria-label="Send" title="Send" data-idle="1">↵</button>
    </div>
    <div class="mark" id="mark" role="toolbar" aria-label="Format" hidden>
      <button data-do="bold"><b>B</b></button>
      <button data-do="italic"><i>I</i></button>
      <button data-do="head" title="Heading">H</button>
      <button data-do="list" title="List">&bull;</button>
      <span class="sep"></span>
      <button data-ink="#241f18" class="dot" style="--c:#241f18" title="Ink"></button>
      <button data-ink="#7d4a22" class="dot" style="--c:#7d4a22" title="Red"></button>
      <button data-ink="#3d5a6c" class="dot" style="--c:#3d5a6c" title="Blue"></button>
      <button data-ink="#4a6a34" class="dot" style="--c:#4a6a34" title="Green"></button>
      <button data-mark="1" class="dot hi" style="--c:#f2e08a" title="Highlight"></button>
    </div>
  </div>

  <!-- right of the pad -->
  <nav class="side right" aria-label="Work">
    <a class="t" href="/steward.html">Steward</a>
    <a class="t" href="/journal.html">Journal</a>
    <a class="t" href="/days.html">Your days</a>
    <a class="t rule" href="/seal.html">Seals</a>
    <a class="t" href="/audit.html">Audit a document</a>
  </nav>

  <div class="foot">
    <span id="found">A conduit, not a source · nothing is generated</span>
    <a href="https://narrowhighway.org">the witness</a>
    <span class="k">Ctrl-K for anything</span>
    <span hidden>narrowing the possibilities</span>
  </div>

</div>

<script src="/kinds.js"></script>
<script src="/speak.js"></script>
<script src="/redact.js"></script>
<script src="/nh-tools.js"></script>
<script>
(function(){
  var API='', TID='nh_tid', ROSTER='nh_ask_roster';
  var ta=document.getElementById('q'), send=document.getElementById('send'), mic=document.getElementById('mic');
  var chain=document.getElementById('chain'), surface=document.getElementById('surface');
  var threadId=null; try{ threadId=localStorage.getItem(TID)||null; }catch(e){}

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function fit(){}                       // a contenteditable grows on its own
  function said(){ return (ta.innerText||'').replace(/ /g,' ').trim(); }
  function scroll(){ requestAnimationFrame(function(){ surface.scrollTop=surface.scrollHeight; }); }

  function render(d){
    var h='';
    if(d.message) h += '<div>'+esc(d.message)+'</div>';
    if(d.verify){
      var v=d.verify;
      h += '<div><span class="verdict '+esc(v.verdict)+'">'+esc(v.verdict)+'</span>'+
           (v.steps!=null?' <span class="trail">· '+esc(v.confirmed_steps)+'/'+esc(v.steps)+' confirmed</span>':'')+'</div>';
      if(v.trail && v.trail.length)
        h += '<div class="trail">'+v.trail.slice(0,4).map(function(t){
          return esc(t.domain||'')+(t.note?' — '+esc(t.note):''); }).join('<br>')+'</div>';
    }
    // checking is not a button — if the words carried a checkable claim, it was already checked
    var checked = d.audit && d.audit.results && d.audit.results.length;
    if(checked){
      h += d.audit.results.map(function(a){
        var ok = a.status==='CONFIRMED';
        return '<div class="hit"><span class="verdict '+(ok?'HOLDS':'BROKEN')+'">'+
               (ok?'holds':'broken')+'</span> '+esc(a.claim)+
               '<span class="sn">'+esc(a.detail||'')+'</span></div>'; }).join('');
      // the boundary still has to be visible — but as one short line, not a paragraph
      h += '<div class="note">only the claim'+(d.audit.results.length>1?'s':'')+' above '+
           (d.audit.results.length>1?'were':'was')+' checked</div>';
    }
    if(d.resources && d.resources.length)
      h += '<div class="res">'+d.resources.map(function(r){
        return r.ref ? '<div class="hit"><a href="'+esc(r.ref)+'">'+esc(r.label)+'</a></div>'
                     : '<div class="hit">'+esc(r.label)+'</div>'; }).join('')+'</div>';
    if(d.scripture && d.scripture.length)
      h += d.scripture.map(function(s){
        return '<div class="hit"><b>'+esc(s.ref||s.title||'')+'</b><span class="sn">'+esc(s.text||s.snippet||'')+'</span></div>'; }).join('');
    // when the claim was checked, the check IS the answer — a fuzzy keyword match is not,
    // and stacking six of them under a verdict buries the one thing that was asked
    if(d.results && d.results.length && !checked)
      h += d.results.slice(0,6).map(function(r){
        return '<div class="hit"><b><a href="/card.html?id='+encodeURIComponent(r.id)+'">'+esc(r.title)+'</a></b>'+
               '<span class="sn">'+esc((r.snippet||'').slice(0,180))+'</span></div>'; }).join('');

    var spoken=d.message||'';
    if(!spoken && d.verify) spoken='The verdict is '+(d.verify.verdict||'')+'.';
    if(!spoken && d.scripture && d.scripture[0]) spoken=(d.scripture[0].ref||'')+'. '+(d.scripture[0].text||'');
    if(!spoken && d.results && d.results[0]) spoken=d.results[0].title+'. '+(d.results[0].snippet||'');
    if(spoken && window.NHSpeak && NHSpeak.available)
      h += '<button class="hear" data-hear="'+esc(spoken.slice(0,600))+'" '+
           'aria-label="Hear this" title="Hear this">♪</button>';
    return h;
  }

  function rosterPut(id,title){
    if(!id) return;
    try{ var l=JSON.parse(localStorage.getItem(ROSTER)||'[]').filter(function(t){return t.thread_id!==id;});
      l.unshift({thread_id:id,title:(title||'').slice(0,80),at:Date.now()});
      localStorage.setItem(ROSTER,JSON.stringify(l.slice(0,50))); }catch(e){}
  }

  async function ask(){
    var text=said(); if(!text) return;
    ta.innerHTML=''; idle();
    var turn=document.createElement('div'); turn.className='turn';
    turn.innerHTML='<div class="you">'+esc(text)+'</div><div class="said"><span class="note">…</span></div>';
    chain.appendChild(turn); scroll();
    var body=turn.querySelector('.said');
    try{
      var clean=(window.Rampart?Rampart.protect(text).clean:text);   // PII stripped on the device
      var payload={text:clean}; if(threadId) payload.thread_id=threadId;
      var r=await fetch(API+'/ask',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
      var d=await r.json();
      if(d.thread_id){ threadId=d.thread_id; try{ localStorage.setItem(TID,threadId);}catch(e){} rosterPut(threadId,text); }
      body.innerHTML=render(d); scroll(); ta.focus();
    }catch(e){ body.innerHTML='<span class="note">The engine is unreachable right now.</span>'; }
  }

  function idle(){ send.setAttribute('data-idle', said() ? '0' : '1'); }
  ta.addEventListener('input',idle); idle();
  function inTable(){
    var s=window.getSelection(); if(!s||!s.rangeCount) return false;
    var n=s.getRangeAt(0).startContainer;
    while(n && n!==ta){ if(n.nodeName==='TD'||n.nodeName==='TH') return true; n=n.parentNode; }
    return false;
  }
  ta.addEventListener('keydown',function(e){
    // Enter sends, as it always has. Inside a table it is a line break — a table is a place
    // you are still building, not a message you are finishing.
    if(e.key==='Enter' && !e.shiftKey && !inTable()){ e.preventDefault(); ask(); }
  });
  // pasted text arrives as text: a paste carrying someone else's stylesheet is not writing
  ta.addEventListener('paste',function(e){
    e.preventDefault();
    var t=(e.clipboardData||window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, t);
  });
  send.addEventListener('click',ask);
  chain.addEventListener('click',function(e){
    var h=e.target.closest('.hear'); if(h&&window.NHSpeak) NHSpeak.play(h.dataset.hear); });
  // ── the document tools ────────────────────────────────────────────────────────────────
  // execCommand is deprecated and still the only formatting API every browser implements
  // without a library. A dependency here would mean a download, which would mean the page
  // stops working offline — so this stays.
  var mark=document.getElementById('mark'), plus=document.getElementById('plus'),
      insmenu=document.getElementById('insmenu');

  function place(){
    var sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount||!ta.contains(sel.anchorNode)){ mark.hidden=true; return; }
    var r=sel.getRangeAt(0).getBoundingClientRect(), p=ta.closest('.pad').getBoundingClientRect();
    if(!r.width && !r.height){ mark.hidden=true; return; }
    mark.hidden=false;
    var x=r.left-p.left+r.width/2-mark.offsetWidth/2, y=r.top-p.top-mark.offsetHeight-8;
    mark.style.left=Math.max(6,Math.min(x, p.width-mark.offsetWidth-6))+'px';
    mark.style.top=Math.max(4,y)+'px';
  }
  var lastRange=null;
  document.addEventListener('selectionchange',function(){
    var sel=window.getSelection();
    if(sel && sel.rangeCount && ta.contains(sel.anchorNode)) lastRange=sel.getRangeAt(0).cloneRange();
    if(document.activeElement===ta) place();
  });
  ta.addEventListener('blur',function(){ setTimeout(function(){
    if(!mark.contains(document.activeElement)) mark.hidden=true; },150); });

  mark.addEventListener('mousedown',function(e){ e.preventDefault(); });   // keep the selection
  mark.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    var d=b.dataset;
    if(d.do==='bold') document.execCommand('bold');
    else if(d.do==='italic') document.execCommand('italic');
    else if(d.do==='head') document.execCommand('formatBlock',false,'h2');
    else if(d.do==='list') document.execCommand('insertUnorderedList');
    else if(d.ink) document.execCommand('foreColor',false,d.ink);
    else if(d.mark) document.execCommand('hiliteColor',false,'#f2e08a');
    idle(); place();
  });

  function cell(n,tag){ var o=''; for(var i=0;i<n;i++) o+='<'+tag+'><br></'+tag+'>'; return o; }
  function closestTag(tag){
    var sel=window.getSelection(); if(!sel||!sel.rangeCount) return null;
    var n=sel.getRangeAt(0).startContainer;
    while(n && n!==ta){ if(n.nodeName===tag) return n; n=n.parentNode; }
    return null;
  }
  plus.addEventListener('click',function(){
    var open=insmenu.hidden;
    insmenu.hidden=!open; plus.setAttribute('aria-expanded', open?'true':'false');
  });
  document.addEventListener('click',function(e){
    if(!insmenu.hidden && !insmenu.contains(e.target) && e.target!==plus){
      insmenu.hidden=true; plus.setAttribute('aria-expanded','false'); }
  });
  insmenu.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    ta.focus();
    var sel=window.getSelection();
    if(lastRange){ sel.removeAllRanges(); sel.addRange(lastRange); }
    if(sel.rangeCount && !sel.isCollapsed) sel.collapseToEnd();   // insert after, never over
    var what=b.dataset.ins;
    if(what==='table'){
      document.execCommand('insertHTML',false,
        '<table><thead><tr>'+cell(3,'th')+'</tr></thead><tbody>'+
        '<tr>'+cell(3,'td')+'</tr><tr>'+cell(3,'td')+'</tr></tbody></table><p><br></p>');
    } else if(what==='rule'){
      document.execCommand('insertHTML',false,'<hr><p><br></p>');
    } else if(what==='row'){
      var tr=closestTag('TR');
      if(tr){ var n=tr.children.length, row=document.createElement('tr');
              row.innerHTML=cell(n,'td'); tr.parentNode.insertBefore(row,tr.nextSibling); }
    } else if(what==='col'){
      var t=closestTag('TABLE');
      if(t) [].forEach.call(t.rows,function(r){
        var c=document.createElement(r.parentNode.nodeName==='THEAD'?'th':'td');
        c.innerHTML='<br>'; r.appendChild(c); });
    }
    insmenu.hidden=true; plus.setAttribute('aria-expanded','false'); idle();
  });

  document.getElementById('newbtn').addEventListener('click',function(){
    threadId=null; try{ localStorage.removeItem(TID);}catch(e){}
    chain.innerHTML=''; ta.innerHTML=''; idle(); ta.focus(); });
  surface.addEventListener('click',function(e){
    if(e.target===surface||e.target===chain) ta.focus(); });

  try{
    if(/(^|\.)narrowhighway\.org$/i.test(location.hostname)){
      var f=document.getElementById('found');
      if(f) f.textContent='A conduit, not a source · the wisdom is in Christ, not this tool';
    }
  }catch(e){}

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    mic.hidden=false;
    var rec=new SR(); rec.lang='en-US'; rec.interimResults=true; rec.continuous=false;
    var listening=false, base='';
    rec.onresult=function(ev){ var s='';
      for(var i=ev.resultIndex;i<ev.results.length;i++) s+=ev.results[i][0].transcript;
      ta.textContent=(base?base+' ':'')+s; idle(); };
    rec.onend=rec.onerror=function(){ listening=false; mic.setAttribute('aria-pressed','false'); };
    mic.addEventListener('click',function(){
      if(listening){ rec.stop(); return; }
      base=said(); listening=true; mic.setAttribute('aria-pressed','true');
      try{ rec.start(); }catch(e){ listening=false; mic.setAttribute('aria-pressed','false'); } });
  }
})();
</script>
</body>
</html>
