<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Read — a free school that works anywhere</title>
<style>
  :root { --bg:#fbf7ee; --ink:#221c12; --soft:#5d5443; --line:#d9cdb3;
          --accent:#9a6a1e; --card:#fffdf7; --ok:#3f7d3f; }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    line-height:1.6; -webkit-text-size-adjust:100%; }
  .wrap { max-width:720px; margin:0 auto; padding:14px 16px 120px; }
  header { display:flex; align-items:baseline; justify-content:space-between; gap:10px;
    padding:10px 0 12px; border-bottom:2px solid var(--line); }
  .brand { font-weight:800; letter-spacing:.02em; }
  .brand .x { color:var(--accent); }
  .prog { font-size:13px; color:var(--soft); font-variant-numeric:tabular-nums; }
  .review { background:#fff4dd; border:1px solid #e3c98c; border-radius:8px;
    padding:8px 12px; font-size:13px; color:#7a5a16; margin:12px 0 0; }
  h1 { font-size:clamp(24px,6vw,34px); line-height:1.15; margin:18px 0 2px; }
  .seq { font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
  .rule { font-size:19px; background:var(--card); border:1px solid var(--line);
    border-inline-start:4px solid var(--accent); border-radius:10px; padding:14px 16px; margin:14px 0; }
  .h { font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); margin:20px 0 6px; }
  .ex { display:flex; flex-wrap:wrap; gap:8px; }
  .ex span { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:6px 13px; font-size:17px; }
  .say { font-size:clamp(20px,5.4vw,27px); font-weight:600; padding:14px 16px; background:#fff;
    border:2px dashed var(--line); border-radius:10px; }
  .mode { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin:10px 0; }
  .mode .lab { font-weight:700; color:var(--accent); }
  .mode .ins { font-size:14px; color:var(--soft); margin:2px 0 6px; }
  .mode .scr { font-size:16px; }
  .check { background:#f3efe2; border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin:16px 0; }
  .check .q { font-weight:600; font-size:18px; }
  button { font:inherit; cursor:pointer; }
  .reveal { margin-top:10px; background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:11px 16px; font-weight:700; min-height:44px; }
  .ans { margin-top:10px; display:none; }
  .ans.show { display:block; }
  .ans .a { font-weight:700; color:var(--ok); font-size:18px; }
  .ans .note { font-size:14px; color:var(--soft); margin-top:4px; }
  nav.bar { position:fixed; left:0; right:0; bottom:0; background:var(--bg); border-top:2px solid var(--line);
    display:flex; gap:8px; padding:10px 12px; max-width:720px; margin:0 auto; }
  nav.bar button { flex:1; min-height:52px; border:1px solid var(--line); background:var(--card);
    border-radius:10px; font-weight:700; font-size:16px; color:var(--ink); }
  nav.bar button:disabled { opacity:.4; }
  nav.bar .toc { flex:0 0 auto; min-width:52px; }
  .toc-list { display:none; }
  .toc-list.show { display:block; }
  .toc-list a { display:block; padding:11px 10px; border-bottom:1px solid var(--line);
    color:var(--ink); text-decoration:none; font-size:16px; }
  footer { margin-top:30px; padding-top:16px; border-top:1px solid var(--line); font-size:13px; color:var(--soft); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Read<span class="x"> ·</span></div>
    <div class="prog" id="prog"></div>
  </header>
  
  <div id="toc" class="toc-list"></div>
  <div id="view"></div>
  <footer>Free, and yours — to keep, to copy, to give. Works with no internet, on any device. This school teaches reading; for the deeper questions it points beyond itself, to Christ.</footer>
</div>

<nav class="bar">
  <button class="toc" id="tocBtn" aria-label="lessons">☰</button>
  <button id="prev">◀ Back</button>
  <button id="next">Next ▶</button>
</nav>

<script>window.NH_UNITS=[{"id": "phonics_letter_sounds", "title": "Letter sounds — every letter has a job", "unit_seq": 1, "track": "phonics_letter_sounds", "rule": "Each letter of the alphabet stands for one or more SOUNDS, not just a name. Before you can read words, you need the letter-sound link. Consonants mostly say their main sound: B says /b/ as in 'ball'. Vowels (A, E, I, O, U, sometimes Y) have two main sounds each — short and long. Today we learn the consonants and the SHORT vowel sound for each vowel. Long vowels come later (with magic-e and vowel teams).", "examples": ["B says /b/ — ball, bag, bed", "C says /k/ — cat, cup, cot (soft /s/ comes later, as in cent)", "D says /d/ — dog, doll, dig", "F says /f/ — fan, fish, fox", "G says /g/ — go, gum, gas (soft /j/ comes later, as in gem)", "H says /h/ — hat, hop, hen", "Vowels SHORT: A /æ/ apple, E /ɛ/ egg, I /ɪ/ inch, O /ɒ/ octopus, U /ʌ/ umbrella", "M says /m/, N says /n/ — common but easy to confuse if quiet", "S says /s/ snake; Z says /z/ zip; the /s/ and /z/ are close — feel your throat", "Y is sometimes a consonant (yes) and sometimes a vowel (sky, baby)"], "decodable_sentence": "Each letter has a sound. Say the sound, not the name.", "modes": [{"id": "coach_reads", "label": "Coach says the sound", "instruction": "Adult shows a letter, says the sound (not the name), and gives an example word. 'B — /b/ — ball.' Run through all consonants and the five short vowels.", "script": "This is B. It says /b/. Like ball, bag, bed. Your turn: /b/."}, {"id": "take_turns", "label": "Take turns", "instruction": "Adult holds a letter card; child says the sound. Then swap — child shows a letter; adult says the sound (occasionally wrong on purpose so child corrects).", "script": "What sound does this letter make? (Hold up D.) Now you pick a letter for me."}, {"id": "i_say", "label": "I say", "instruction": "Child sees a letter and says the sound. Stuck → Echo (adult says it first), then Phonics (give an example word starting with that letter), then Repeat.", "script": "What sound? (Show letters one at a time.)"}], "check": {"prompt": "What's the difference between the NAME of a letter and the SOUND of a letter? Use B as an example.", "answer": "The NAME of B is 'bee' (the word you hear when you sing the ABC song). The SOUND of B is /b/ — short, like the start of 'ball'. When you read, you use the SOUND, not the name. If you tried to read 'bag' by names, you'd say 'bee-ay-gee' — which doesn't sound like 'bag'. You read 'bag' by sounds: /b/ /æ/ /g/ — that blends into 'bag'.", "teaching_note": "This is the single most-missed concept at the start of phonics. Many children learn the alphabet song (names) before they learn sounds, then get stuck. Practice with letters they know names for: 'I know the NAME — what's the SOUND?' Until the sounds are automatic, every other phonics unit is harder."}, "wedges": ["wedge_repeat", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": [], "next": "phonics_short_a", "summary": "Letter-sound correspondence — the precursor to all decoding. Twenty-six consonants + five short vowel sounds. The check distinguishes letter NAME (bee) from letter SOUND (/b/) — the most-missed concept at the start of reading.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "authority_trust"]}, {"id": "sight_words_set_1", "title": "Heart words, set 1 -- the, a, I, to, and", "unit_seq": 1, "track": "phonics_sight_words", "rule": "Some words appear so often you must know them INSTANTLY -- you cannot sound out a whole book one letter at a time. Most of these high-frequency words are MOSTLY regular: sound out the regular letters and learn only the one TRICKY part 'by heart'. That tricky part is the word's HEART. and = /a/ /n/ /d/ (fully regular -- no heart). a = says a quick /uh/ (schwa). I = always a CAPITAL letter and says its long name /i/. the = 'th' is regular; the e is the HEART (says /uh/, not short /e/). to = t is regular; the o is the HEART (says /oo/, not short /o/).", "examples": ["and -- /a/ /n/ /d/, fully decodable, no heart", "a -- one letter, a quick /uh/ (schwa)", "I -- always capital, says its name /i/", "the -- th + e; the e is the HEART (/uh/)", "to -- t + o; the o is the HEART (/oo/)"], "decodable_sentence": "I go to the dog and the cat.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Adult reads each word, points to the HEART part (the tricky letter), names why it is tricky, then reads the decodable sentence aloud while pointing.", "script": "Watch my finger. This word is 'the'. The hard part is the e -- it says /uh/. The 'th' you already know."}, {"id": "take_turns", "label": "Take turns", "instruction": "Adult reads the first word, child the next, alternating down the list, then swap and read the sentence together a word each.", "script": "My turn: the first word. Your turn: the next one."}, {"id": "i_read", "label": "I read", "instruction": "Child reads the words then the sentence. Stuck on a heart word -> Echo (adult says it), name the heart part, then Repeat. Stuck on a decodable one -> sound it out.", "script": "You read them now. If a word is tricky, I'll show you its heart."}], "check": {"prompt": "In the word 'the', which letter is the heart (the part you learn by heart), and what does the rest say?", "answer": "The HEART is the e -- it says /uh/ here, not its usual short /e/. The rest, 'th', is a regular digraph you already know /th/. So 'the' = /th/ + /uh/.", "teaching_note": "Frame every high-frequency word as 'mostly regular + a small heart'. It is far less to remember than a whole word, and it keeps decoding the main strategy."}, "wedges": ["wedge_repeat", "wedge_echo", "wedge_chunk", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_letter_sounds"], "next": "sight_words_set_2", "summary": "The five most common words. and is fully decodable; a and I are one-piece; the and to each carry a single 'heart' (e=/uh/, o=/oo/). Introduces the heart-word idea.", "domains": ["linguistics", "reading", "pedagogy"], "axes": ["information_encoding", "authority_trust"]}, {"id": "phonics_short_a", "title": "Short A — the cat sat", "unit_seq": 2, "track": "phonics_vowels", "rule": "When the vowel A sits between two consonants in a single syllable (a closed syllable, CVC), it usually says /æ/ — the sound at the start of apple.", "examples": ["cat", "bat", "sat", "mat", "ran", "man", "bag", "jam", "tap", "cap", "sad", "mad"], "decodable_sentence": "The fat cat sat on the mat and had a nap.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "The engine reads the decodable sentence aloud while highlighting each word. The learner watches and listens. No reading pressure yet.", "script": "Watch and listen. I'll read it first. Then we'll take turns."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads the first word, learner reads the second, alternating. Builds fluency without isolation. Engine models prosody on its turns.", "script": "My turn: 'The'. Your turn: …"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the whole sentence aloud; engine listens (when STT available) or just waits. If stuck, escalate via wedges in order: Repeat → Chunk → Echo.", "script": "You read it now. I'm here if you get stuck."}], "check": {"prompt": "Read these three out loud: bag, dot, fin. Which one has the short-A sound?", "answer": "bag", "distractors": ["dot (short-O)", "fin (short-I)"]}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_letter_sounds"], "next": "phonics_short_e", "summary": "Short A says /æ/ in closed syllables like cat, bat, sat. Twelve example words, a decodable sentence, three reading modes (Coach reads · Take turns · I read), and a three-word check.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "sight_words_set_2", "title": "Heart words, set 2 -- is, it, in, on, at", "unit_seq": 2, "track": "phonics_sight_words", "rule": "Five short, common words. FOUR are fully decodable (it, in, on, at) -- just practice until they are instant, no heart needed. ONE has a heart: is = /i/ + s, but the s says /z/ (feel your throat buzz). Knowing which words need a heart and which are just regular keeps a reader from 'memorizing' words they can already sound out.", "examples": ["it -- /i/ /t/ decodable", "in -- /i/ /n/ decodable", "on -- /o/ /n/ decodable", "at -- /a/ /t/ decodable", "is -- /i/ + s, but s says /z/ (HEART)"], "decodable_sentence": "The cat is on it. A bug is in the cup.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Adult reads each word, points to the HEART part (the tricky letter), names why it is tricky, then reads the decodable sentence aloud while pointing.", "script": "Watch my finger. This word is 'the'. The hard part is the e -- it says /uh/. The 'th' you already know."}, {"id": "take_turns", "label": "Take turns", "instruction": "Adult reads the first word, child the next, alternating down the list, then swap and read the sentence together a word each.", "script": "My turn: the first word. Your turn: the next one."}, {"id": "i_read", "label": "I read", "instruction": "Child reads the words then the sentence. Stuck on a heart word -> Echo (adult says it), name the heart part, then Repeat. Stuck on a decodable one -> sound it out.", "script": "You read them now. If a word is tricky, I'll show you its heart."}], "check": {"prompt": "Of these four -- it, in, is, at -- one has a heart and three do not. Which one, and why?", "answer": "'is' has the heart: the s says /z/, not /s/. The other three (it, in, at) follow the regular closed-syllable short-vowel pattern, so they are fully decodable.", "teaching_note": "The 's says /z/' pattern returns in many words (his, has, was, as). Naming it once here pays off repeatedly."}, "wedges": ["wedge_repeat", "wedge_echo", "wedge_chunk", "wedge_phonics", "wedge_praise"], "prerequisites": ["sight_words_set_1"], "next": "sight_words_set_3", "summary": "Four fully-decodable high-frequency words plus 'is' (s=/z/). Teaches the learner to tell decodable words from true heart words.", "domains": ["linguistics", "reading", "pedagogy"], "axes": ["information_encoding", "authority_trust"]}, {"id": "phonics_short_e", "title": "Short E — Ben fed the hen", "unit_seq": 3, "track": "phonics_vowels", "rule": "When the vowel E sits between two consonants in a closed syllable (CVC), it usually says /ɛ/ — the sound at the start of egg. Note: short-E and short-I sound similar to many learners ('pen' vs 'pin'); a clear mirror or finger-on-throat trick helps distinguish jaw positions.", "examples": ["bed", "red", "wet", "net", "ten", "hen", "leg", "get", "let", "men", "pen", "fed"], "decodable_sentence": "Ben fed the red hen ten wet eggs in the pen.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads each word and the decodable sentence. Emphasize the /ɛ/ vowel each time. Pair with short-A: 'cat → cet' to show the difference.", "script": "Listen for the /ɛ/ sound: bed, red, wet, net. Say it with me: /ɛ/."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads words from the short-A list, learner reads from short-E list. Mixing previously-mastered vowels with new ones is how transfer builds.", "script": "I'll say 'bat'. You say 'bet'. I'll say 'cap'. You say 'cep'… wait, no — 'cep' isn't a word, but the SOUND is right!"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the decodable sentence. Stuck → Chunk (break it up), then Echo (engine reads, learner repeats), then Phonics (point to the rule).", "script": "Your turn to read the sentence."}], "check": {"prompt": "Read these three: bag, beg, big. Which one has the short-E sound?", "answer": "beg", "distractors": ["bag (short-A)", "big (short-I)"]}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_short_a"], "next": "phonics_short_i", "summary": "Short E says /ɛ/ in closed syllables. Twelve example words, a decodable sentence pairing Ben + hen + ten + eggs, and a check that surfaces the short-A vs short-E vs short-I confusion (the three minimal-pair vowels at this age).", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "sight_words_set_3", "title": "Heart words, set 3 -- of, you, was, for, are", "unit_seq": 3, "track": "phonics_sight_words", "rule": "The BIG tricky ones -- the most irregular high-frequency words, mostly heart. Learn them slowly and on purpose. of: looks like 'off' but the f says /v/ -> /u/ /v/. you: y + 'ou' saying /oo/. was: the a says /o/ and the s says /z/ -> /w/ /o/ /z/. for: the 'or' is r-controlled (a regular pattern -- the r changes the vowel) -> /for/. are: almost all heart, says /ar/ (also r-controlled).", "examples": ["of -- /u/ /v/; the f says /v/, so it sounds like 'uv', NOT 'off'", "you -- /y/ /oo/; the 'ou' says /oo/", "was -- /w/ /o/ /z/; the a says /o/, the s says /z/", "for -- /f/ + r-controlled 'or' -> /for/ (a regular pattern)", "are -- /ar/; r-controlled, mostly heart"], "decodable_sentence": "You are for the dog. It was a cup of jam.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Adult reads each word, points to the HEART part (the tricky letter), names why it is tricky, then reads the decodable sentence aloud while pointing.", "script": "Watch my finger. This word is 'the'. The hard part is the e -- it says /uh/. The 'th' you already know."}, {"id": "take_turns", "label": "Take turns", "instruction": "Adult reads the first word, child the next, alternating down the list, then swap and read the sentence together a word each.", "script": "My turn: the first word. Your turn: the next one."}, {"id": "i_read", "label": "I read", "instruction": "Child reads the words then the sentence. Stuck on a heart word -> Echo (adult says it), name the heart part, then Repeat. Stuck on a decodable one -> sound it out.", "script": "You read them now. If a word is tricky, I'll show you its heart."}], "check": {"prompt": "What is the most surprising thing about the word 'of', and what does it actually sound like?", "answer": "The f says /v/ (not /f/), so 'of' sounds like 'uv' -- it does NOT rhyme with 'off'. The o is a quick schwa /u/. 'of' is one of the few words where f says /v/, so it is worth memorizing that heart.", "teaching_note": "Contrast 'of' (/uv/) with 'off' (/of/) directly -- children routinely confuse them. Say both, exaggerate the /v/ vs /f/."}, "wedges": ["wedge_repeat", "wedge_echo", "wedge_chunk", "wedge_phonics", "wedge_praise"], "prerequisites": ["sight_words_set_2"], "next": "sight_words_set_4", "summary": "The hardest common irregulars (of, you, was) plus two r-controlled words (for, are) that are regular once r-control is known. The heaviest heart-word load.", "domains": ["linguistics", "reading", "pedagogy"], "axes": ["information_encoding", "authority_trust"]}, {"id": "phonics_short_i", "title": "Short I — the big pig", "unit_seq": 4, "track": "phonics_vowels", "rule": "When the vowel I sits between two consonants in a closed syllable (CVC), it usually says /ɪ/ — the sound at the start of inch. Many learners confuse short-I and short-E. The trick: short-I has a smaller mouth opening and the tongue is higher.", "examples": ["sit", "big", "pig", "win", "fish", "this", "kid", "lip", "dig", "hit", "mix", "fix"], "decodable_sentence": "The big pig will sit in the pit with the kid.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads, exaggerates the /ɪ/ vowel. Pairs with short-E to expose the contrast: 'pin' vs 'pen', 'bit' vs 'bet', 'lid' vs 'led'.", "script": "Listen: /ɪ/. Pin. Bit. Lid. Now: pen, bet, led. Hear the difference?"}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a short-E word, learner reads the short-I minimal pair: pen → pin, bet → bit, led → lid.", "script": "I say 'pen'. You say 'pin'. I say 'bet'. You say 'bit'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence. Stuck → Echo first (this vowel is tricky to hear), then Phonics (point to the i), then Chunk.", "script": "Your turn to read."}], "check": {"prompt": "Read: pin, pen, pan. Which is the short-I word?", "answer": "pin", "distractors": ["pen (short-E)", "pan (short-A)"]}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_short_e"], "next": "phonics_short_o", "summary": "Short I says /ɪ/ in closed syllables. Twelve example words, a decodable sentence, and a three-vowel check (pin/pen/pan) targeting the most common confusion. The mouth-shape trick distinguishes short-I from short-E.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "sight_words_set_4", "title": "Not heart words at all -- he, she, we, me, be", "unit_seq": 4, "track": "phonics_sight_words", "rule": "These five look like sight words but they are NOT -- they share a RULE. When a vowel is the LAST letter of a syllable (an 'open syllable'), it says its long name. So the e says /ee/. he, she, we, me, be are all just consonant + /ee/. Never make a child memorize a word they can decode -- teach the rule instead. (Compare: in 'met' the e is closed in by t, so it says short /e/; in 'me' the e is open, so it says long /ee/.)", "examples": ["he -- /h/ /ee/", "she -- /sh/ /ee/", "we -- /w/ /ee/", "me -- /m/ /ee/", "be -- /b/ /ee/"], "decodable_sentence": "He and she can see me. We can be glad.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Adult reads each word, points to the HEART part (the tricky letter), names why it is tricky, then reads the decodable sentence aloud while pointing.", "script": "Watch my finger. This word is 'the'. The hard part is the e -- it says /uh/. The 'th' you already know."}, {"id": "take_turns", "label": "Take turns", "instruction": "Adult reads the first word, child the next, alternating down the list, then swap and read the sentence together a word each.", "script": "My turn: the first word. Your turn: the next one."}, {"id": "i_read", "label": "I read", "instruction": "Child reads the words then the sentence. Stuck on a heart word -> Echo (adult says it), name the heart part, then Repeat. Stuck on a decodable one -> sound it out.", "script": "You read them now. If a word is tricky, I'll show you its heart."}], "check": {"prompt": "Why does the e say long /ee/ in 'me' but short /e/ in 'met'?", "answer": "In 'me' the e is the LAST letter -- an OPEN syllable -- so it says its long name /ee/. In 'met' the e is closed in by the t -- a CLOSED syllable -- so it says short /e/. Open syllable = long vowel; closed syllable = short vowel.", "teaching_note": "This is the honest core of the lesson: many 'sight words' are decodable by rule. Teaching the open-syllable rule here removes guessing and transfers to go, so, hi, no, my, and hundreds more."}, "wedges": ["wedge_repeat", "wedge_echo", "wedge_chunk", "wedge_phonics", "wedge_praise"], "prerequisites": ["sight_words_set_3"], "next": "sight_words_set_5", "summary": "The open-syllable rule (final vowel says its long name) -- he/she/we/me/be are decodable, not sight words. Replaces memorizing with a transferable rule.", "domains": ["linguistics", "reading", "pedagogy"], "axes": ["information_encoding", "authority_trust"]}, {"id": "phonics_short_o", "title": "Short O — the hot dog", "unit_seq": 5, "track": "phonics_vowels", "rule": "When the vowel O sits between two consonants in a closed syllable (CVC), it usually says /ɒ/ or /ɑ/ — the sound at the start of octopus. The mouth opens wide and round. In some American dialects, short-O sounds close to short-A in certain words ('cot' vs 'caught').", "examples": ["top", "hot", "dog", "log", "box", "mom", "pop", "rock", "sock", "not", "fox", "got"], "decodable_sentence": "The hot dog got on top of the box.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads, exaggerates the rounded mouth shape. Pairs with short-A: 'top' vs 'tap', 'rock' vs 'rack' — different vowels, different words.", "script": "Listen and watch my mouth: hot. Hot dog. Rocks on top. /ɒ/. Round mouth."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a short-A word, learner reads the short-O minimal pair: tap → top, rack → rock, mat → mot (not a word, but the sound is right).", "script": "I say 'tap'. You say 'top'. I say 'rack'. You say 'rock'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence. Stuck → Phonics (point to the o, show the round mouth), then Echo, then Repeat.", "script": "Your turn to read the sentence."}], "check": {"prompt": "Read: pot, pat, pet. Which is the short-O word?", "answer": "pot", "distractors": ["pat (short-A)", "pet (short-E)"]}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_short_i"], "next": "phonics_short_u", "summary": "Short O says /ɒ/ in closed syllables. Twelve example words, a decodable sentence (hot dog, on top, of the box), and a check distinguishing short-O from short-A and short-E. Mouth-shape (round, open) is the cue.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "sight_words_set_5", "title": "Heart words, set 5 -- this, that, then, with, them", "unit_seq": 5, "track": "phonics_sight_words", "rule": "Five very common words that all use the digraph 'th'. Every one is DECODABLE once you know th -> th + short vowel (+ consonant). Practice them for SPEED, not memorization. (Tiny note: the s in 'this' drifts toward /z/ for some speakers -- a soft heart at most.)", "examples": ["this -- /th/ /i/ /s/", "that -- /th/ /a/ /t/", "then -- /th/ /e/ /n/", "with -- /w/ /i/ /th/", "them -- /th/ /e/ /m/"], "decodable_sentence": "This is for them. Then that cat sat with us.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Adult reads each word, points to the HEART part (the tricky letter), names why it is tricky, then reads the decodable sentence aloud while pointing.", "script": "Watch my finger. This word is 'the'. The hard part is the e -- it says /uh/. The 'th' you already know."}, {"id": "take_turns", "label": "Take turns", "instruction": "Adult reads the first word, child the next, alternating down the list, then swap and read the sentence together a word each.", "script": "My turn: the first word. Your turn: the next one."}, {"id": "i_read", "label": "I read", "instruction": "Child reads the words then the sentence. Stuck on a heart word -> Echo (adult says it), name the heart part, then Repeat. Stuck on a decodable one -> sound it out.", "script": "You read them now. If a word is tricky, I'll show you its heart."}], "check": {"prompt": "Are these (this, that, then, with, them) mostly heart words or mostly decodable, and why?", "answer": "Mostly DECODABLE. Once you know the 'th' digraph, they follow the regular closed-syllable pattern (th + short vowel + consonant). At most, the s in 'this' leans toward /z/. So practice them for fluency, don't memorize them.", "teaching_note": "Ending the set on decodable words reinforces the throughline: reach for decoding first; reserve 'by heart' only for the genuine tricky part."}, "wedges": ["wedge_repeat", "wedge_echo", "wedge_chunk", "wedge_phonics", "wedge_praise"], "prerequisites": ["sight_words_set_4"], "next": null, "summary": "Five th- words, all decodable -- closes the set by reinforcing that most high-frequency words are sounded out, with heart reserved for true irregularities.", "domains": ["linguistics", "reading", "pedagogy"], "axes": ["information_encoding", "authority_trust"]}, {"id": "phonics_short_u", "title": "Short U — the sun and the bug", "unit_seq": 6, "track": "phonics_vowels", "rule": "When the vowel U sits between two consonants in a closed syllable (CVC), it usually says /ʌ/ — the sound at the start of umbrella. The mouth is relaxed, jaw slightly dropped. Short-U is the least 'colored' vowel sound — almost a grunt.", "examples": ["sun", "run", "cup", "bus", "mud", "bug", "cut", "fun", "hug", "jump", "duck", "bunk"], "decodable_sentence": "The bug ran up the cup and jumped in the mud.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads, with relaxed jaw. Pairs with all four other short vowels to complete the set: 'pat-pet-pit-pot-put'.", "script": "Listen to all five short vowels: pat, pet, pit, pot, put. Five different sounds, five different vowels. Today's vowel: /ʌ/. Like sun. Run. Mud."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads any short vowel CVC word; learner identifies which vowel. Then swap. This is the cumulative review.", "script": "I say 'fun'. You tell me: which vowel is that? (Short-U.) Now I say 'fan'. Which vowel? (Short-A.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and a mixed-vowel review list (cat, hen, pig, dog, bug). Stuck on the mix → Phonics (point to the vowel and name its sound).", "script": "Your turn. Read the sentence. Then read this list: cat, hen, pig, dog, bug."}, {"id": "mixed_review", "label": "Mixed review", "instruction": "Extra mode for the fifth short vowel — review all five together. Engine reads a word; learner names the vowel. Then swap. Confirms mastery of the set.", "script": "Round-robin: I'll read 10 words, you name the vowel for each. Then 10 more for me."}], "check": {"prompt": "Read: bag, beg, big, bog, bug. Five words with five different vowels. Can you say them all clearly?", "answer": "bag (short-A) → beg (short-E) → big (short-I) → bog (short-O) → bug (short-U). Five minimal pairs that cover the full short-vowel set.", "teaching_note": "This is the capstone check for short vowels. If the learner reads all five clearly, they've mastered closed-syllable CVC. If they confuse any pair, return to that unit before moving to blends."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_short_o"], "next": "phonics_blends_l", "summary": "Short U says /ʌ/ in closed syllables — completes the five-short-vowel set. Twelve examples, a decodable sentence, plus a mixed-review mode and a five-vowel capstone check (bag-beg-big-bog-bug).", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_blends_l", "title": "L-blends — bl, cl, fl, gl, pl, sl", "unit_seq": 7, "track": "phonics_blends", "rule": "A consonant blend is two consonants where you HEAR BOTH sounds. L-blends combine a consonant with L: BL, CL, FL, GL, PL, SL. The trick: say each sound, then slide them together fast. /b/-/l/-op → blop. Don't drop either consonant — that's what makes it a blend, not a single sound.", "examples": ["black", "blue", "clip", "clap", "flag", "flat", "glad", "glass", "plus", "plan", "slip", "sled"], "decodable_sentence": "The black flag is on the blue glass plate by the sled.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads each word, isolating the blend: 'b-l-ack… black'. Names the blend. Compares to single-consonant CVC: 'bat' vs 'blat' (not a real word, but the blend is heard).", "script": "Listen: /b/, /l/, /ack/. Slide: black. Same with /c/, /l/, /ip/. Clip. /f/, /l/, /ag/. Flag."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a CVC root, learner adds an L: 'lack' → 'black'. 'lip' → 'flip'. 'lass' → 'glass'.", "script": "I say 'lack'. You add a b: 'black'. I say 'lip'. You add an f: 'flip'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and word list. Stuck → Phonics (point to each consonant), then Chunk (b-l-ack), then Echo.", "script": "Your turn. Read each word. Then the sentence."}], "check": {"prompt": "Read: bat, blat, brat. Which two have a blend? What's the difference between the two blends?", "answer": "'blat' has BL (b + l). 'brat' has BR (b + r). 'bat' has just B. Both BL and BR are blends — two consonants you can hear. The difference is the SECOND consonant: l vs r. (The next unit is the R-blends.)", "teaching_note": "L-blends and R-blends are the most-confused blend pair. Practice minimal pairs (black/brack-not-a-word, flat/frat, clap/crap) to build the ear for the second consonant."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_short_u"], "next": "phonics_blends_r", "summary": "L-blends (bl, cl, fl, gl, pl, sl) — six common L-initial blends. Twelve examples, decodable sentence, and a check that foreshadows R-blends. The build-it-by-adding mode (lip → flip) is the strongest scaffold here.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_blends_r", "title": "R-blends — br, cr, dr, fr, gr, pr, tr", "unit_seq": 8, "track": "phonics_blends", "rule": "R-blends are seven common blends with R as the second consonant: BR, CR, DR, FR, GR, PR, TR. Same rule as L-blends — you hear BOTH consonants. /b/-/r/-own → brown. The R in a blend isn't yet 'r-controlled' (that's a later unit) — it's just the second consonant.", "examples": ["brown", "brave", "crab", "crop", "drum", "drop", "frog", "from", "grab", "grin", "prize", "price", "tree", "trip"], "decodable_sentence": "The brown frog will grab the green crab from the tree.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads, isolating the blend. Pairs L-blend and R-blend minimal pairs to expose the contrast: black/brack-not-word, flat/frat, clap/crap, glow/grow.", "script": "Listen: /b/, /r/, /own/. Brown. Now compare: black (with L) and brick (with R). Different second consonants."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads an L-blend word; learner reads the R-blend cousin: blip → brip-not-a-word but blow/brow, flip/frip-not-word. The contrast is the point.", "script": "I say 'blow'. You change l to r: 'brow'. I say 'glow'. You change l to r: 'grow'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and mixed L/R blend list. Stuck → Phonics (point to the second consonant), then Echo, then Chunk.", "script": "Your turn. Read the sentence."}], "check": {"prompt": "Read: trap, tap, trip. Which two have an R-blend? Which one is just a CVC?", "answer": "'trap' (TR + ap) and 'trip' (TR + ip) both have the R-blend. 'tap' is just CVC (no blend — single T at the start).", "teaching_note": "R-blends are foundational. Children who master L-blends and R-blends decode roughly 30% more English words. Pair this unit with timed reading of mixed-blend lists to build automaticity."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_blends_l"], "next": "phonics_blends_st", "summary": "R-blends (br, cr, dr, fr, gr, pr, tr) — seven common R-initial blends. The L/R contrast is the load-bearing pattern. Fourteen examples + a decodable sentence that uses three R-blends in one sentence.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_blends_st", "title": "S-blends — st, sp, sk, sn, sm, sw", "unit_seq": 9, "track": "phonics_blends", "rule": "S-blends combine S with another consonant. Common: ST, SP, SK, SN, SM, SW. Same rule — both consonants are heard. The /s/ at the start is the friction sound. Slide the second consonant: /s/-/t/-op → stop. /s/-/p/-in → spin.", "examples": ["stop", "star", "step", "stand", "stick", "spot", "spin", "spell", "speak", "skip", "sky", "ask", "snap", "snow", "smile", "swim"], "decodable_sentence": "Stop and look at the stars in the sky. The snow will spin.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads each word, isolating the blend. Highlights that S is the constant — only the second consonant changes.", "script": "Listen: /s/, /t/, /op/. Stop. /s/, /p/, /in/. Spin. /s/, /k/, /ip/. Skip. The S stays — the second sound changes."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a CVC root, learner adds the s and consonant blend: 'top' → 'stop'. 'and' → 'stand'. 'in' → 'spin'.", "script": "I say 'top'. You add the st: 'stop'. I say 'and'. You add the st: 'stand'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and word list. Stuck → Phonics (point to the blend, say each consonant), then Chunk (s/top), then Echo.", "script": "Your turn. Read each word. Then the sentence."}], "check": {"prompt": "Read these three: top, stop, slop. Which two have a blend?", "answer": "stop (s+t blend), slop (s+l blend). 'top' has just one consonant at the start.", "teaching_note": "The 'blend has two sounds you hear' test is what distinguishes blends from digraphs (next track). In 'shop', sh = /ʃ/ (ONE new sound). In 'stop', st = /s/ + /t/ (TWO sounds you hear)."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_blends_r"], "next": "phonics_blends_final", "summary": "S-blends (st, sp, sk, sn, sm, sw) — six common S-initial blends. Sixteen examples, decodable sentence, and a check that surfaces the blend-vs-digraph distinction (load-bearing for the next track).", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_blends_final", "title": "Final blends — at the end of the word", "unit_seq": 10, "track": "phonics_blends", "rule": "Blends also happen at the END of words. Common final blends: -ND (end, sand), -MP (jump, lamp), -NT (tent, hunt), -NK (think, sank), -ST (last, fast), -FT (left, soft), -LT (belt, melt), -LP (help, gulp). Same rule — both consonants are heard. The vowel is short (closed syllable) because the two consonants 'protect' it.", "examples": ["end", "sand", "hand", "jump", "lamp", "stamp", "tent", "hunt", "sink", "think", "last", "fast", "soft", "left", "help", "melt"], "decodable_sentence": "Hunt for the lamp and stamp on the soft sand at the end of the tent.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads, isolating the final blend. Names the pattern: 'short vowel + two consonants at the end'.", "script": "Listen: /j/, /u/, /m/, /p/. Jump. Hear both M and P at the end? That's the blend."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word with no final blend (a CVC), learner adds a consonant to make a final blend: 'jut' → 'jump' (add p). 'sat' → 'sand' (change t to nd).", "script": "I say 'jut'. Add a p at the end: 'jump'. I say 'set'. Add a nd: 'send'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and word list. Stuck → Chunk (read the vowel, then both final consonants), then Echo, then Phonics.", "script": "Your turn."}], "check": {"prompt": "Read: jump, jum, jumps. Which is a real word? What's the difference?", "answer": "'jump' (with the final MP blend) and 'jumps' (jump + s) are real. 'jum' isn't — without the final consonant, the word feels unfinished. Final blends 'close' the syllable.", "teaching_note": "This check teaches that final blends are doing real work — they close the syllable and let the vowel stay short. Pair with adding -s (plural / verb): 'jump' → 'jumps' is the doorway to the suffix unit later."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_blends_st"], "next": "phonics_digraph_sh_th", "summary": "Final blends — eight common patterns at the END of words (nd, mp, nt, nk, st, ft, lt, lp). Sixteen examples + decodable sentence using five final blends. Check teaches that final blends close the syllable.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_digraph_sh_th", "title": "Digraphs — sh, th, ch", "unit_seq": 11, "track": "phonics_digraphs", "rule": "A digraph is two letters that make ONE new sound — different from either letter alone. SH = /ʃ/ (shoe). TH = /θ/ or /ð/ (think, this). CH = /tʃ/ (chair). Digraphs are NOT blends — you don't hear two sounds; you hear one new sound. The two letters stay together as a team.", "examples": ["ship", "shop", "shut", "fish", "wish", "this", "that", "then", "thin", "math", "chair", "much"], "decodable_sentence": "Shut the shop and wash the dish in this big chair.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads, isolating the digraph as ONE sound. Contrasts with blends: 'st-op' (two sounds) vs 'sh-op' (one new sound). Critical distinction.", "script": "Listen carefully. /sh/. Just one sound, not two. SHip. SHop. Not S-Hip. SH is a team."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a non-digraph word, learner reads the digraph version: 'sip' → 'ship'. 'tin' → 'thin'. 'cat' → 'chat'.", "script": "I say 'sip'. You change s to sh: 'ship'. I say 'tin'. You change t to th: 'thin'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck → Phonics (point to the digraph, say the ONE sound), then Echo, then Repeat. Common error: reading 'sh' as /s/+/h/. Correct by ear, not by lecture.", "script": "Your turn to read the sentence."}], "check": {"prompt": "Which makes ONE new sound and which makes TWO sounds you can hear: 'sh' in 'ship', 'st' in 'stop'?", "answer": "'sh' in 'ship' is ONE new sound (digraph). 'st' in 'stop' is TWO sounds you hear (blend). Both have two letters; only digraphs make a new sound.", "teaching_note": "This is the load-bearing distinction for the rest of phonics. Once a learner can hear the difference, every digraph (ch, th, wh, ph, ng, ck) becomes easier. If they can't yet hear it, slow down and use minimal pairs (sip/ship, tin/thin)."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_blends_final"], "next": "phonics_digraph_wh_ph", "summary": "Three digraphs (sh, th, ch) with the load-bearing rule: two letters, ONE new sound. Twelve examples, decodable sentence, and a check that surfaces the digraph-vs-blend distinction (the foundation for all later phonics).", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_digraph_wh_ph", "title": "Digraphs — wh and ph", "unit_seq": 12, "track": "phonics_digraphs", "rule": "Two more digraphs: WH = /w/ (most American English; some dialects breathe it as /hw/). PH = /f/. The PH = /f/ rule is surprising — two letters that say the same sound as F. PH comes from Greek (telephone, photo, dolphin). When you see PH, say /f/ and move on.", "examples": ["when", "what", "where", "why", "white", "whale", "wheel", "photo", "phone", "graph", "dolphin", "alphabet"], "decodable_sentence": "When the phone rings, the dolphin sees a photo of the whale.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads, names each digraph and its sound. Contrasts /w/ at the start (when, what) with /f/ (photo, phone). The PH=F surprise gets a small reveal.", "script": "Listen: /w/. When. What. Where. Now PH. /f/. Photo. Phone. Surprise — PH says /f/, not /p/+/h/."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a question word starting with WH; learner reads it back. Then engine reads a PH word; learner reads it back. The minimal-pair drill is 'when' vs 'phone' — same length, very different sounds.", "script": "I say 'when'. You say 'when'. I say 'phone'. You say 'phone'. Different starting digraphs — what are they?"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and word list. Stuck on PH → Phonics (point to PH, say /f/), then Echo. The most common error is reading PH as /p/+/h/. Correct gently.", "script": "Your turn."}], "check": {"prompt": "Read: phone. Some people might read it as 'p-hone'. Why is that wrong? What does PH say?", "answer": "PH says /f/. Phone sounds like 'fone' — there's no /p/ sound at the start, even though there's a P in the spelling. The PH digraph comes from Greek and was kept when English borrowed the words. Photo, dolphin, alphabet, and graph all use PH = /f/.", "teaching_note": "The Greek-origin tidbit is engaging for older learners. For younger ones, just 'PH says /f/ — that's the rule, it's a team' is enough. Practice with PH words specifically until /f/ is automatic."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_digraph_sh_th"], "next": "phonics_digraph_ck_ng", "summary": "Digraphs WH = /w/ and PH = /f/. Twelve examples, including question words and Greek-origin PH words. Check surfaces the surprise that PH says /f/ (not /p/+/h/).", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_digraph_ck_ng", "title": "Digraphs — ck and ng", "unit_seq": 13, "track": "phonics_digraphs", "rule": "Two more digraphs that show up at the END of words. CK = /k/ — used after a SHORT vowel at the end of a one-syllable word (back, sick, lock, duck). NG = /ŋ/ — the nasal sound at the end of words like 'ring' or 'song'. Both are digraphs (one sound from two letters), and both have a rule about WHERE they appear.", "examples": ["back", "sick", "lock", "duck", "pack", "kick", "sock", "luck", "ring", "sing", "song", "king", "long", "bang", "wing", "bring"], "decodable_sentence": "The duck will sing a long song and bring back a sock.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names each digraph's role: CK = /k/ at end after short vowel; NG = the nasal /ŋ/. Compares CK words (back, sick) with K words (book, week — different vowels).", "script": "Listen: back. CK says /k/. Short vowel A, then CK. Now: sing. NG says /ŋ/ — that's the nose sound. Hold your nose and say it."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a CVC, learner adds CK or NG: 'sa' → 'sack' (add ck). 'ri' → 'ring' (add ng). The build-it-by-adding mode again.", "script": "I say 'pa'. Add ck: 'pack'. I say 'ki'. Add ng: 'king'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and word list. Stuck → Phonics (point to the digraph), then Chunk (vowel + digraph), then Echo. NG is the hardest to hear; the nose-pinch trick helps.", "script": "Your turn to read."}], "check": {"prompt": "Why do we write 'back' but not 'bak'? Why CK instead of just K?", "answer": "After a short vowel at the end of a one-syllable word, English uses CK instead of just K. 'Bak' would look unfinished; 'back' is correct. The rule: short vowel + CK at the end. Same with 'pack', 'sick', 'lock', 'duck'. If the vowel is long (like 'bake'), no CK is needed — magic-e takes over (next unit).", "teaching_note": "The CK rule is the first 'spelling pattern' rule the learner sees (vs just decoding). Children may not need it for READING (back and bak would both decode), but it shows them English has structure — there's always a reason. Pair with seeing the rule violated in foreign words ('Iraq', 'haiku') — exceptions exist, but the rule covers the vast majority."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_digraph_wh_ph"], "next": "phonics_cvce_a", "summary": "Digraphs CK = /k/ (after short vowel, word end) and NG = /ŋ/ (the nasal). Sixteen examples + decodable sentence. Check introduces the CK spelling rule — the first structural pattern in English the learner explicitly sees.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_cvce_a", "title": "Magic-e with A — make, late, cake", "unit_seq": 14, "track": "phonics_magic_e", "rule": "When a word ends in vowel-consonant-E (the silent E), the vowel goes LONG and says its NAME. The E at the end is silent. 'cap' (short A) → 'cape' (long A — says 'A'). The E is 'magic' because it changes the vowel without making any sound itself. It's also called silent-E or CVCe.", "examples": ["cap → cape", "mad → made", "tap → tape", "mat → mate", "plan → plane", "game", "make", "name", "face", "late", "came", "date"], "decodable_sentence": "Make a date to bake the cake at the lake by the gate.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads minimal pairs (short → long): 'cap → cape'. Shows the silent-E rule. The E doesn't make a sound; it transforms the vowel.", "script": "Watch what happens when I add E. Cap. (Add E.) Cape. The A changed from short to long — it now says its NAME, A."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a CVC; learner reads the CVCe version: 'cap' → 'cape'. 'mad' → 'made'. 'tap' → 'tape'.", "script": "I say 'cap'. You add silent-E: 'cape'. I say 'mad'. You add silent-E: 'made'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence and minimal-pair list. Stuck → Phonics (point to the silent E, point to the long vowel), then Echo, then Repeat.", "script": "Your turn to read the sentence."}], "check": {"prompt": "Why is the E in 'cake' silent? What does it DO if it's silent?", "answer": "The silent E doesn't make its own sound — but it CHANGES the vowel in front. Without the E, 'cak' would have a short A (like 'sack'). With the E, the A goes long and says its name: 'cake'. The E is doing work even though it's silent. That's why it's called magic-E.", "teaching_note": "This is one of the most magical moments in early reading — the silent letter that does the work. Children love the 'magic' framing. Practice with paired cards (cap/cape, mad/made, tap/tape) flipped fast — the eye learns to look for the final E."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_digraph_ck_ng"], "next": "phonics_cvce_i", "summary": "Magic-E with A: cap → cape, mad → made. The silent E transforms the short vowel into a long one. Twelve examples + decodable sentence (make, date, bake, cake, lake, gate — six magic-E A words in one sentence). Check explains the 'magic' rule.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_cvce_i", "title": "Magic-e with I — bike, ride, time", "unit_seq": 15, "track": "phonics_magic_e", "rule": "Same magic-E rule, now with I. CVCe with I → long-I (says the name 'I'). 'bit' (short I) → 'bite' (long I). The E is silent; the I says its name.", "examples": ["bit → bite", "kit → kite", "rid → ride", "fin → fine", "slim → slime", "time", "like", "line", "ride", "bike", "mile", "side"], "decodable_sentence": "I like to ride my bike a mile down the line and slide on the slime.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads pairs: 'bit → bite', 'kit → kite', 'rid → ride'. Same magic-E rule, applied to I.", "script": "Bit. (Add E.) Bite. The I went long. Same magic, same rule — just I this time."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads short-I CVC; learner makes it long with magic-E. Reverse: engine reads CVCe; learner removes the E.", "script": "I say 'bit'. You add silent-E: 'bite'. I say 'kite'. You remove the E: 'kit'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence + minimal-pair list. Stuck → Phonics (point to silent E), then Echo, then Repeat.", "script": "Your turn."}], "check": {"prompt": "Read: bit, bite, bid, bide. What's the rule that decides short or long I?", "answer": "Bit (short — no E) → Bite (long — silent E). Bid (short — no E) → Bide (long — silent E). The rule: if there's a silent E at the end, the I says its name. If there's no E, the I is short.", "teaching_note": "Four-word minimal-pair drills are gold for magic-E. Pair them on flash cards or write them in two columns (short / long). The eye learns to scan for the final E before reading the vowel."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_cvce_a"], "next": "phonics_cvce_o", "summary": "Magic-E with I: bit → bite, kit → kite. Same rule, different vowel. Twelve examples + decodable sentence with six magic-E I words.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_cvce_o", "title": "Magic-e with O — hope, rope, stone", "unit_seq": 16, "track": "phonics_magic_e", "rule": "Magic-E with O. 'hop' (short O) → 'hope' (long O — says 'O'). Silent E transforms.", "examples": ["hop → hope", "not → note", "rod → rode", "cod → code", "slop → slope", "stone", "bone", "home", "rope", "drove", "close", "zone"], "decodable_sentence": "At home I hope to ride my bone-shaped rope close to the stone.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads pairs: 'hop → hope', 'not → note', 'rod → rode'. Same magic-E rule.", "script": "Hop. (Add E.) Hope. Long O — says its name."}, {"id": "take_turns", "label": "Take turns", "instruction": "Pair drill — engine reads CVC, learner reads CVCe.", "script": "I say 'hop'. You: 'hope'. I say 'not'. You: 'note'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck → Phonics, Echo, Repeat.", "script": "Your turn."}], "check": {"prompt": "Read: cod, code, cot, coke. Which two have long O?", "answer": "'code' (long O — silent E) and 'coke' (long O — silent E). 'cod' and 'cot' have short O (no silent E).", "teaching_note": "This check mixes magic-E with the CK rule (next unit reviews it). Reinforces that two different patterns can give the same long-vowel result if applied correctly."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_cvce_i"], "next": "phonics_cvce_ue", "summary": "Magic-E with O: hop → hope. Twelve examples + decodable sentence with six magic-E O words.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_cvce_ue", "title": "Magic-e with U and E — cube, use, here", "unit_seq": 17, "track": "phonics_magic_e", "rule": "Magic-E with U: tub → tube, cub → cube. Long U sometimes says /yoo/ (use, cute) and sometimes /oo/ (tube, rude) — both count as 'long U'. Magic-E with E: less common but real — 'here', 'these', 'theme'. Completes the magic-E set: A, I, O, U, E.", "examples": ["tub → tube", "cub → cube", "cut → cute", "us → use", "rud → rude (not common)", "mute", "fuse", "theme", "these", "here", "Pete", "scene"], "decodable_sentence": "Use the cute cube at home. Here is the mute fuse for these themes.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names the two long-U sounds (/yoo/ and /oo/). Shows that magic-E with E is rare but the rule still works.", "script": "Tube. Long U, /oo/ sound. Cube. Long U, /yoo/ sound. Both are long U. Here. Long E. The rule covers all five vowels."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads short version; learner adds magic-E.", "script": "I say 'cut'. You: 'cute'. I say 'us'. You: 'use'."}, {"id": "i_read", "label": "I read", "instruction": "Learner reads sentence + list. Stuck → Phonics, Echo, Repeat.", "script": "Your turn."}, {"id": "capstone", "label": "All five vowels", "instruction": "Mixed review across all five magic-E vowels. Engine reads any CVC; learner adds magic-E. Confirms mastery of the full set.", "script": "I'll read CVC words from any vowel; you add silent-E. Ready?"}], "check": {"prompt": "Look at all five magic-E pairs: cap→cape, bit→bite, hop→hope, cut→cute, them→theme. What's the SAME about every pair? What's DIFFERENT?", "answer": "SAME: every short vowel becomes long when you add silent E. The pattern works for all five vowels. DIFFERENT: each vowel sounds different in long form (A=/eɪ/, I=/aɪ/, O=/oʊ/, U=/yu/ or /u/, E=/i/) — they all say their NAME, but the names are different.", "teaching_note": "This is the magic-E capstone. If the learner can run all five pairs cleanly, magic-E is internalized. The 'each vowel says its name' framing is the lifelong reading rule — long vowels say their alphabet name. Worth saying explicitly: 'long vowel = letter name, short vowel = different sound.'"}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_cvce_o"], "next": "phonics_vowel_team_ai_ay", "summary": "Magic-E with U (cube, cute) and E (here, these) — completes the magic-E set across all five vowels. Capstone mode runs all five pairs. Check teaches the 'long vowel says its name' lifelong rule.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_vowel_team_ai_ay", "title": "Vowel teams — long A: ai and ay", "unit_seq": 18, "track": "phonics_vowel_teams", "rule": "Two vowels together usually make ONE long-vowel sound — 'when two vowels go walking, the first one does the talking'. For long A: AI in the MIDDLE of a word (rain, paint, train), AY at the END of a word (day, play, may). Both say /eɪ/, the long A sound.", "examples": ["rain", "train", "paint", "wait", "sail", "mail", "day", "play", "stay", "may", "way", "gray"], "decodable_sentence": "On a rainy day I wait for the train to come down the gray sail.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names the AI vs AY rule (AI middle, AY end). Compares to magic-E A: 'cake' (magic-E) vs 'rain' (vowel team) — both long A.", "script": "Rain. AI in the middle. Day. AY at the end. Same long A sound, /eɪ/ — three ways to spell it now: cake (magic-E), rain (AI), day (AY)."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner says which spelling pattern it uses (magic-E? AI? AY?).", "script": "I say 'play'. What pattern? (AY at the end.) I say 'cake'. What pattern? (Magic-E.) I say 'paint'. What pattern? (AI in the middle.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence + word list. Stuck → Phonics (point to the team), then Echo, then Repeat.", "script": "Your turn."}], "check": {"prompt": "Why is it 'rain' not 'rayn', and 'day' not 'dai'?", "answer": "The rule: AI goes in the MIDDLE of a word (rain, paint, train, sail). AY goes at the END (day, play, way, may). 'Rayn' breaks the rule (AY in middle); 'dai' breaks it (AI at end). English follows the rule almost always.", "teaching_note": "The middle-vs-end rule is one of the cleanest spelling rules in English. Practice with hands — left hand for 'middle' (AI), right hand for 'end' (AY). Children who internalize this rule spell long-A words correctly more often."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_cvce_ue"], "next": "phonics_vowel_team_ee_ea", "summary": "Long A vowel teams: AI (middle) and AY (end). Twelve examples + decodable sentence. Check teaches the position rule (AI middle, AY end). Three ways to spell long A now: magic-E (cake), AI (rain), AY (day).", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_vowel_team_ee_ea", "title": "Vowel teams — long E: ee and ea", "unit_seq": 19, "track": "phonics_vowel_teams", "rule": "Long E vowel teams: EE (tree, bee, see, week) and EA (eat, sea, leaf, dream). Both say /i/, the long E sound. EE is more reliable; EA sometimes makes other sounds (short E in 'head', long A in 'great'). When in doubt, try long E first — it works most of the time.", "examples": ["tree", "bee", "see", "week", "sleep", "green", "eat", "sea", "leaf", "dream", "meat", "read"], "decodable_sentence": "I see a green bee eat a leaf from the tree by the sea.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names both teams and warns about EA's exceptions ('head' = short E; 'great' = long A).", "script": "Tree. EE says long E. Eat. EA says long E. Most of the time. But: 'head' — EA says short E. 'Great' — EA says long A. EA is tricky."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner reads it back and says which team. Mix in tricky words.", "script": "I say 'sleep'. What team? (EE.) I say 'meat'. What team? (EA, long E.) I say 'head'. What team? (EA, but short E — exception.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads the sentence. If stuck on EA → try long E first; if it doesn't make a real word, try short E.", "script": "Your turn."}], "check": {"prompt": "Read these EA words: meat, head, great. They have the same letters in the middle. Why do they sound different?", "answer": "All three have EA, but EA isn't always long E. 'Meat' is long E (/i/) — the usual case. 'Head' is short E (/ɛ/) — an exception. 'Great' is long A (/eɪ/) — a rare exception. There's no rule for which sound EA makes; you have to know each word.", "teaching_note": "This check teaches that English has exceptions. Most EA words are long E (the safest first guess), but 'head', 'bread', 'dead', 'great', 'break' are common exceptions to memorize. Don't drill exceptions too hard at this stage — recognize them in context."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_vowel_team_ai_ay"], "next": "phonics_vowel_team_oa_ow", "summary": "Long E vowel teams: EE (reliable) and EA (usually long E, sometimes short E or long A). Twelve examples + decodable sentence. Check teaches that EA has exceptions — first exposure to 'most of the time' rules.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_vowel_team_oa_ow", "title": "Vowel teams — long O: oa and ow", "unit_seq": 20, "track": "phonics_vowel_teams", "rule": "Long O vowel teams: OA in the middle (boat, coat, road, soap) and OW (sometimes at end, sometimes mid: snow, slow, show, blow). Both can say /oʊ/, long O. OW is tricky — it also says /aʊ/ in some words (cow, now, brown, down). Most one-syllable OW words at the end are long O.", "examples": ["boat", "coat", "road", "soap", "goat", "load", "snow", "slow", "show", "blow", "grow", "know"], "decodable_sentence": "The slow goat will float in the boat on the road and watch the snow grow.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names OA (middle) and OW (often end). Warns that OW can also say /aʊ/ in 'cow', 'now' — that's the diphthong unit later.", "script": "Boat. OA in the middle, long O. Snow. OW at the end, long O. But also: cow. OW says /aʊ/. We'll cover that later. For now: OA is always long O; OW is usually long O."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner reads it back and says the team.", "script": "I say 'load'. What team? (OA, long O.) I say 'know'. What team? (OW, long O.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck on OW → try long O first.", "script": "Your turn."}], "check": {"prompt": "OA and OW both spell long O. So why do we have two different spellings?", "answer": "English borrowed words from many languages and kept their original spellings. Most OA words come from older English (boat, road, coat); most OW words come from words where the sound shifted over time (snow, grow). The rule is mostly: OA in the MIDDLE, OW at the END. You'll start to feel which one looks right with practice.", "teaching_note": "This is the first 'why two spellings' question. The honest answer (history) is age-appropriate. Children find it satisfying that English has REASONS, even messy ones. Don't drill the historical detail — just the position rule."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_vowel_team_ee_ea"], "next": "phonics_vowel_team_igh_ie", "summary": "Long O vowel teams: OA (middle) and OW (often end, sometimes long O, sometimes diphthong /aʊ/). Twelve examples + decodable sentence. Check teaches the position rule and the 'English has history' framing.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_vowel_team_igh_ie", "title": "Vowel teams — long I: igh and ie", "unit_seq": 21, "track": "phonics_vowel_teams", "rule": "Long I has two main team spellings: IGH (high, night, light, sight — three letters, the GH is silent) and IE (pie, tie, die — at the end of short words). Both say /aɪ/, long I. The IGH pattern is one of the strangest in English — three letters, only one sound.", "examples": ["high", "night", "light", "sight", "right", "might", "pie", "tie", "die", "lie", "fight", "bright"], "decodable_sentence": "At night I might see a bright light on the right side of the pie.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names IGH (mid) and IE (end). Highlights the silent GH — three letters, one sound. That's the surprise.", "script": "Night. IGH — three letters, just /aɪ/. Pie. IE — two letters, /aɪ/. The G and H in IGH are silent. Strange but consistent."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner reads it back and says the team. Practice the silent GH separately.", "script": "I say 'fight'. What team? (IGH.) What's silent? (G and H.) I say 'pie'. What team? (IE.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck on IGH → Phonics (point out the silent GH); then Echo.", "script": "Your turn."}], "check": {"prompt": "Read 'light' and 'tie'. Both have long I. How many letters in each? How many of those letters make a sound?", "answer": "'Light' has 5 letters but only 3 make sounds (L, the IGH=/aɪ/, T). The G and H are silent. 'Tie' has 3 letters and all 3 contribute (T, IE=/aɪ/). The IGH pattern is the strangest: three letters, one sound.", "teaching_note": "Silent letters surprise children. The IGH cluster is the most common silent cluster they'll meet at this age. Pair with other silent letters (silent K in 'knee', 'know', silent W in 'write') so the concept generalizes."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_vowel_team_oa_ow"], "next": "phonics_vowel_team_oo", "summary": "Long I vowel teams: IGH (with silent GH) and IE (short words ending in long I). Twelve examples + decodable sentence. Check surfaces silent letters as a real pattern — first exposure to 'letters can be there but make no sound'.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_vowel_team_oo", "title": "Vowel team OO — book vs moon", "unit_seq": 22, "track": "phonics_vowel_teams", "rule": "OO has TWO common sounds. Short OO /ʊ/ as in 'book', 'look', 'foot', 'good' — short, like the U in 'put'. Long OO /u/ as in 'moon', 'food', 'tool', 'pool' — long, like the OO in 'boo'. There's no spelling rule that tells you which one — you have to try both and see which makes a real word.", "examples": ["book", "look", "took", "good", "foot", "wood", "moon", "food", "tool", "pool", "spoon", "zoom"], "decodable_sentence": "Look at the good book on the moon. The spoon is in the pool of food.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads minimal pairs (book vs boot — same OO, different sound). Names the short-OO vs long-OO contrast. Practices both.", "script": "Book. Short OO, /ʊ/. Boot. Long OO, /u/. Same letters, different sound. Look. Spoon. Hear the difference?"}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner says short or long OO. Then swap.", "script": "I say 'good'. Short or long? (Short.) I say 'cool'. Short or long? (Long.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck → try long OO first; if it doesn't sound like a real word, try short OO.", "script": "Your turn."}], "check": {"prompt": "Read 'book' and 'boot'. They look almost the same — what makes them sound different?", "answer": "Both have OO. 'Book' has short OO (/ʊ/) — quick, like in 'put'. 'Boot' has long OO (/u/) — held longer, like in 'too'. There's no spelling difference that tells you which to use; you have to know each word. With practice, your eye starts to predict.", "teaching_note": "OO is the first 'two-sound team' that has no rule. Children learn to TRY both options and pick the one that makes sense. This is the foundational decoding skill for any English pattern with multiple sounds — the 'try and check' habit."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_vowel_team_igh_ie"], "next": "phonics_r_controlled_ar_or", "summary": "Vowel team OO with two sounds: short (book) and long (moon). Twelve examples + decodable sentence using both. Check teaches the 'try both and pick the real word' decoding strategy — useful for every two-sound pattern.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_r_controlled_ar_or", "title": "R-controlled — ar and or", "unit_seq": 23, "track": "phonics_r_controlled", "rule": "When R follows a vowel, the R 'controls' the vowel — the vowel doesn't say its short OR long sound anymore. AR = /ɑr/ (car, star, jar, farm). OR = /ɔr/ (for, fork, born, corn). These are NEW vowel sounds. The R is the boss when it stands next to a vowel.", "examples": ["car", "star", "jar", "farm", "park", "hard", "for", "fork", "born", "corn", "north", "horse"], "decodable_sentence": "The car is in the park. Look for the horse near the corn in the barn.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names the R-controlled pattern — R changes the vowel completely. Contrasts with short A (cap) and long A (cape): AR is neither.", "script": "Cap. (Short A.) Cape. (Long A.) Car. (R-controlled — new sound, /ɑr/.) The R changes the A. Same with O: pot (short), pope (long), port (R-controlled, /ɔr/)."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word with AR or OR; learner reads it back and names the pattern.", "script": "I say 'farm'. What R-controlled? (AR.) I say 'corn'. What R-controlled? (OR.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck → Phonics (R controls the vowel — it's not short or long); Echo; Repeat.", "script": "Your turn."}], "check": {"prompt": "Read: cap, cape, car. What's the vowel sound in each? Why is 'car' different?", "answer": "Cap: short A (/æ/). Cape: long A (/eɪ/, says its name). Car: R-controlled A (/ɑr/). The R after the A changed the sound completely — it's neither short nor long, it's a new sound. R controls the vowel.", "teaching_note": "R-controlled vowels surprise kids who've just mastered short and long vowels. The 'R is the boss' framing helps. Pair with the foundational concept: short, long, and R-controlled are THREE different vowel families. R-controlled is its own thing."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_vowel_team_oo"], "next": "phonics_r_controlled_er_ir_ur", "summary": "R-controlled AR and OR — when R follows the vowel, it changes the sound completely. Twelve examples + decodable sentence using both AR and OR. Check teaches the 'short, long, R-controlled' three-way framing.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_r_controlled_er_ir_ur", "title": "R-controlled — er, ir, ur all say /ɜr/", "unit_seq": 24, "track": "phonics_r_controlled", "rule": "ER (her, fern), IR (bird, girl, sir), and UR (turn, hurt, burn) all say the same sound: /ɜr/. Three spellings, one sound. No rule tells you which to use — it's word-by-word memory. Reading them is easy; spelling them is the hard part.", "examples": ["her", "fern", "term", "bird", "girl", "sir", "first", "third", "turn", "hurt", "burn", "nurse"], "decodable_sentence": "The girl turned first to her bird and saw the nurse hurt her arm.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads all three teams. Says explicitly: 'three spellings, one sound'. Reads ER, IR, UR back-to-back so the sameness is obvious.", "script": "Her. Bird. Turn. (Pause.) Same sound, /ɜr/. Three different spellings: ER, IR, UR. They all say /ɜr/ when you read them. Spelling is harder — you have to know each word."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner reads it back. Then swap — engine SPELLS the word out loud (h-e-r); learner says the word.", "script": "I say 'fern'. You read it. (Easy: /fɜrn/.) Now I'll spell: g-i-r-l. What word? (Girl.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Reading these is easy (just /ɜr/) — the focus is consistency.", "script": "Your turn."}], "check": {"prompt": "All three say /ɜr/: ER in 'her', IR in 'bird', UR in 'turn'. Why does English have three spellings for the same sound?", "answer": "Because English borrowed words from many languages over hundreds of years and kept their original spellings. The sound is one; the spellings are historical accidents. You'll start to feel which one 'looks right' with practice (a 'bird' looks wrong as 'berd' even though it sounds the same).", "teaching_note": "This unit prepares the learner for the messiest part of English spelling — three spellings, one sound. Don't drill spelling here; just reading. Spelling these correctly is a year-2 or year-3 skill that comes from exposure, not rules."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_r_controlled_ar_or"], "next": "phonics_diphthong_oi_oy", "summary": "R-controlled ER, IR, UR — three spellings, one sound (/ɜr/). Twelve examples + decodable sentence using all three. Check explains the historical reason for English's three-spellings situation. Reading is easy; spelling comes later.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_diphthong_oi_oy", "title": "Diphthongs — oi and oy", "unit_seq": 25, "track": "phonics_diphthongs", "rule": "A diphthong is a vowel sound that glides from one position to another. OI and OY both say /ɔɪ/ — the sound in 'boy' or 'oil'. OI in the MIDDLE of a word (oil, boil, coin); OY at the END (boy, toy, joy). Same rule as AI/AY for long A — the middle/end position decides which spelling.", "examples": ["oil", "boil", "coin", "point", "join", "soil", "boy", "toy", "joy", "enjoy", "employ", "destroy"], "decodable_sentence": "The boy will enjoy his new toy. Join him to point at the coin in the soil.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names the OI vs OY rule (middle vs end). The /ɔɪ/ sound feels different — practice the glide aloud.", "script": "Listen and feel your mouth: /ɔɪ/. Boy. Toy. Joy. Your lips round, then spread. That's a diphthong — a glide. Now: oil. Coin. Middle position uses OI."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner reads it back and names the pattern.", "script": "I say 'point'. OI or OY? (OI, middle.) I say 'joy'. OI or OY? (OY, end.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck → Phonics (point to the team), Echo, Repeat.", "script": "Your turn."}], "check": {"prompt": "Why is it 'boy' not 'boi'? Why 'oil' not 'oyl'?", "answer": "OI goes in the MIDDLE; OY at the END. Same position rule as AI/AY for long A. 'Boi' has OI at the end — breaks the rule. 'Oyl' has OY in the middle — also breaks it. English follows this rule almost always.", "teaching_note": "The OI/OY rule mirrors AI/AY. If the learner mastered that pattern, this transfers fast. The 'feel the glide in your mouth' framing is what makes diphthongs memorable — they're physical, not just abstract."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_r_controlled_er_ir_ur"], "next": "phonics_diphthong_ou_ow", "summary": "Diphthongs OI (middle) and OY (end) — both /ɔɪ/. Twelve examples + decodable sentence. Check teaches the position rule (same as AI/AY).", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_diphthong_ou_ow", "title": "Diphthongs — ou and ow", "unit_seq": 26, "track": "phonics_diphthongs", "rule": "OU and OW both say /aʊ/ — the sound in 'cow' or 'out'. OU in the MIDDLE (out, loud, round, count); OW often at the END or middle (cow, how, brown, town). NOTE: OW can also say long O (snow, slow — earlier unit). When you see OW, try /aʊ/ first; if it's not a real word, try long O.", "examples": ["out", "loud", "round", "count", "mouth", "cloud", "cow", "how", "brown", "town", "down", "crown"], "decodable_sentence": "The brown cow is loud as it counts in the round town.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names OU vs OW
