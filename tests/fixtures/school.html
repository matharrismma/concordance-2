. Reminds about OW's two sounds (long O OR diphthong) — try diphthong first for short words.", "script": "Out. OU in the middle, /aʊ/. Cow. OW at the end, /aʊ/. Different from snow (OW long O). Same OW, two sounds — try /aʊ/ first."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word; learner reads back, names the team and sound.", "script": "I say 'mouth'. What team? (OU, /aʊ/.) I say 'down'. What team? (OW, /aʊ/.) I say 'snow'. What team? (OW, long O — exception.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck on OW → try /aʊ/ first; if not a real word, try long O.", "script": "Your turn."}], "check": {"prompt": "OW says two different sounds in 'cow' and 'snow'. How do you decide which sound?", "answer": "There's no rule — you have to try and see. Try /aʊ/ first (more common in short words): /kaʊ/ (cow). If it doesn't sound like a real word, try long O: /snoʊ/ (snow). Reading is part rule, part 'try and check'. The 'check' is: 'does this sound like a word I know?'", "teaching_note": "This is the same try-both strategy as OO (book vs moon). Children who develop this habit decode fluently even when patterns conflict. Practice mixed OW lists where some are /aʊ/ and some are long O."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_diphthong_oi_oy"], "next": "phonics_soft_c_g", "summary": "Diphthongs OU (middle) and OW — both can say /aʊ/. OW can also be long O (snow). Twelve examples + decodable sentence. Check reinforces the try-both decoding strategy.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_soft_c_g", "title": "Soft C and soft G", "unit_seq": 27, "track": "phonics_soft_letters", "rule": "C and G have TWO sounds each. HARD C = /k/ (cat, cup, cot — before A, O, U). SOFT C = /s/ (cent, city, cell — before E, I, Y). HARD G = /g/ (go, gum, gas — usually before A, O, U). SOFT G = /j/ (gem, giant, gym — often before E, I, Y, but with more exceptions). The rule: C and G usually go SOFT before E, I, Y.", "examples": ["cat (hard C, /k/)", "cot (hard C)", "cup (hard C)", "cent (soft C, /s/)", "city (soft C)", "cell (soft C)", "go (hard G, /g/)", "gum (hard G)", "gem (soft G, /j/)", "giant (soft G)", "gym (soft G)", "gentle (soft G)"], "decodable_sentence": "The giant cat saw a cent in the city and went to the gym.", "modes": [{"id": "coach_reads", "label": "Coach reads", "instruction": "Engine reads. Names the EIY rule for soft C and G. Practices both letters back-to-back.", "script": "Cat. Hard C, /k/, before A. Cent. Soft C, /s/, before E. Go. Hard G, /g/, before O. Gem. Soft G, /j/, before E. The rule: before E, I, Y, both go soft."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine reads a word starting with C or G; learner says hard or soft. Then swap.", "script": "I say 'city'. C: hard or soft? (Soft, before I.) I say 'giant'. G: hard or soft? (Soft, before I.) I say 'gum'. G: hard or soft? (Hard, before U.)"}, {"id": "i_read", "label": "I read", "instruction": "Learner reads. Stuck → Phonics (look at the next letter; if E, I, or Y, try soft). Then try hard if soft doesn't make a word.", "script": "Your turn."}], "check": {"prompt": "What letter comes after the C in 'city'? What letter after the C in 'cat'? What's the rule?", "answer": "'City' has I after C — soft C, /s/. 'Cat' has A after C — hard C, /k/. The rule: C goes SOFT before E, I, or Y; otherwise hard. Same with G (mostly).", "teaching_note": "The 'look at the next letter' habit is what makes soft C/G readable. Practice with a Sharpie circling the letter after every C or G in a paragraph — the visual habit transfers to the eye. Exception worth flagging: 'get', 'gift', 'give', 'girl' have G before E or I but stay hard. English has exceptions; the rule is still useful."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_diphthong_ou_ow"], "next": "phonics_syllable_types", "summary": "Soft C (/s/ before E, I, Y) and soft G (/j/ before E, I, Y). Twelve examples + decodable sentence using all four (hard/soft × C/G). Check teaches the 'look at the next letter' habit — the foundational decoding move for these letters.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_syllable_types", "title": "Six syllable types — the bridge to long words", "unit_seq": 28, "track": "phonics_syllables", "rule": "Every English syllable falls into ONE of SIX types. Knowing the type tells you the vowel sound. (1) CLOSED — ends in a consonant, vowel is short (cat, hop). (2) OPEN — ends in a vowel, vowel is long (he, go, hi). (3) MAGIC-E — VCe pattern, long vowel + silent E (cake, hope). (4) VOWEL-TEAM — two vowels make one sound (rain, tree, boat). (5) VOWEL-R / R-controlled — vowel + R, R changes the vowel (car, her). (6) CONSONANT-LE — ends in -le with a consonant before (apple, table). Multi-syllable words combine these.", "examples": ["cat (closed, short A)", "he (open, long E)", "cake (magic-E, long A)", "rain (vowel-team, long A)", "car (vowel-R)", "apple (consonant-LE in second syllable)", "ho-tel (open + closed)", "but-ter (closed + r-controlled)", "mu-sic (open + closed)", "table (open + consonant-LE)"], "decodable_sentence": "To read 'table', see two syllables: ta (open, long A) plus ble (consonant-LE).", "modes": [{"id": "coach_models", "label": "Coach demonstrates", "instruction": "Engine takes a multi-syllable word, splits it into syllables, names the type of each, then reads it.", "script": "Hotel. Two syllables: ho / tel. Ho — open syllable, ends in vowel, long O. Tel — closed syllable, short E. Hotel."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine names a syllable type; learner gives a word in that type. Then swap.", "script": "I say 'closed'. You give a word. (Cat. Hop. Bed.) I say 'open'. (He. Go. Hi.) I say 'magic-E'. (Cake. Bike.)"}, {"id": "i_split", "label": "I split", "instruction": "Learner takes a multi-syllable word, splits it into syllables, names the types. Stuck → Chunk (clap the syllables), then Echo, then Phonics.", "script": "Take 'rabbit'. Where do you split it? What type is each part?"}], "check": {"prompt": "Split 'sunset' into syllables and name each type. Then split 'reading' and do the same.", "answer": "'Sunset' = sun / set. Both are CLOSED (end in consonant, short vowel). 'Reading' = read / ing. 'Read' is VOWEL-TEAM (EA, long E). 'Ing' is CLOSED (short I, ends in consonant). The two-syllable rule: split between two consonants (sun-set), or after a vowel team (read-ing).", "teaching_note": "Syllable types are the bridge from short-word reading to long-word reading. Once a child can identify the syllable type, they know what vowel sound to use — without that, multi-syllable words are guesswork. This is the year-2 or year-3 transition unit. Master it before tackling words like 'fantastic' or 'beautiful'."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_soft_c_g"], "next": "phonics_suffixes", "summary": "Six syllable types (closed, open, magic-E, vowel-team, vowel-R, consonant-LE) — the framework for decoding multi-syllable words. Ten examples + decodable sentence. Check uses two everyday multi-syllable words (sunset, reading) to practice splitting + naming.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "reasoning"]}, {"id": "phonics_suffixes", "title": "Suffixes — s, ed, ing", "unit_seq": 29, "track": "phonics_affixes", "rule": "A SUFFIX is an ending added to a base word that changes its meaning. Three of the most common: -S (plural: cats, dogs; or verb: she runs), -ED (past tense: walked, played, jumped), -ING (continuous: walking, playing, jumping). Sometimes the spelling changes when you add the suffix: double the consonant (run → running), drop silent E (bake → baking), change Y to I (cry → cried).", "examples": ["cat → cats", "dog → dogs", "walk → walked", "play → played", "jump → jumping", "run → running (double consonant)", "bake → baked (drop silent E)", "bake → baking (drop silent E)", "cry → cried (Y to I)", "try → tried", "fix → fixes (add ES after X, S, SH, CH, Z)", "kiss → kisses"], "decodable_sentence": "She walked her dogs and tried to fix the things by jumping over the boxes.", "modes": [{"id": "coach_models", "label": "Coach adds", "instruction": "Engine takes a base word, adds each suffix, names the spelling change if any. Reads the result.", "script": "Walk. Add -ED: walked. Add -ING: walking. No spelling change. Now: run. Add -ING: running — double the N. (Special rule.)"}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine gives a base word + suffix; learner spells the result. Then swap. Spelling-change examples are tricky — practice them.", "script": "Base: hop. Suffix: -ed. Spell it. (Hopped — double the P.) Base: hope. Suffix: -ed. (Hoped — drop silent E.) Different!"}, {"id": "i_add", "label": "I add", "instruction": "Learner adds suffixes to base words from a list. Stuck → Phonics (point to the rule that applies), Echo, Repeat.", "script": "Add -ED to: jump, bake, run, cry. Spell each one."}], "check": {"prompt": "Why is 'hopped' spelled with two P's but 'hoped' has one P and silent E?", "answer": "'Hop' has a short vowel and one consonant at the end. To keep the vowel short when adding -ED, we double the consonant: hopped. 'Hope' has a long vowel and silent E. The E goes away when we add -ED: hoped. The doubling and the silent-E drop are two different rules — both keep the original vowel sound.", "teaching_note": "This is the foundational spelling-rule unit. Children who master 'double the consonant' and 'drop silent E' write past-tense and continuous-tense verbs correctly. Pair with reading older texts where they'll see these patterns dozens of times per page."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_praise"], "prerequisites": ["phonics_syllable_types"], "next": "phonics_prefixes", "summary": "Three core suffixes (-s, -ed, -ing) with their spelling-change rules (double consonant, drop silent E, Y to I). Twelve examples + decodable sentence using all three. Check explains the doubling vs E-dropping rules side-by-side.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "time_sequence"]}, {"id": "phonics_prefixes", "title": "Prefixes — un, re, pre, dis", "unit_seq": 30, "track": "phonics_affixes", "rule": "A PREFIX is added to the START of a base word and changes its meaning. UN- means 'not' or 'reverse' (happy → unhappy; tie → untie). RE- means 'again' (do → redo; play → replay). PRE- means 'before' (school → preschool; pay → prepay). DIS- means 'not' or 'apart' (like → dislike; agree → disagree). The base word's spelling doesn't change when you add a prefix.", "examples": ["happy → unhappy", "tie → untie", "do → redo", "play → replay", "school → preschool", "pay → prepay", "like → dislike", "agree → disagree", "kind → unkind", "read → reread", "heat → preheat", "appear → disappear"], "decodable_sentence": "To untie the unhappy knot, redo the steps and disagree with the unkind way.", "modes": [{"id": "coach_models", "label": "Coach adds", "instruction": "Engine takes a base word, adds a prefix, names the meaning. Practice all four prefixes.", "script": "Happy. Add UN: unhappy. UN means 'not'. Now: do. Add RE: redo. RE means 'again'. School. Add PRE: preschool. PRE means 'before'."}, {"id": "take_turns", "label": "Take turns", "instruction": "Engine gives a base word; learner adds a prefix to change the meaning. Then swap — learner gives a prefix; engine adds it.", "script": "Base: tie. Add UN: untie (means 'reverse tying'). Now you pick a base; I'll add a prefix."}, {"id": "i_choose", "label": "I choose", "instruction": "Learner is given a base word and chooses which prefix fits the meaning they want. Stuck → Phonics (think about what the prefix means), then Echo, then Meaning.", "script": "You want to say 'do something again'. Which prefix? (RE.) Add it to 'do'. (Redo.)"}], "check": {"prompt": "You want to say 'NOT happy'. You can use 'unhappy' OR 'dishappy'. Which is right? Why?", "answer": "'Unhappy' is correct; 'dishappy' isn't a word. Both UN and DIS can mean 'not', but each prefix attaches to specific words by convention. UN goes with most adjectives (unhappy, unkind, unsafe). DIS goes with verbs and some adjectives (dislike, disagree, dishonest). There's no perfect rule — it's word-by-word familiarity. The good news: most word-prefix combinations are limited, and you'll hear the right one in context.", "teaching_note": "This check teaches an important truth about English: many rules have multiple options, and convention picks the right one. Practice with sets of word pairs (happy/unhappy, like/dislike, do/redo) so the conventions become familiar without explicit rules. Reading widely is the real teacher here."}, "wedges": ["wedge_repeat", "wedge_chunk", "wedge_echo", "wedge_phonics", "wedge_meaning", "wedge_praise"], "prerequisites": ["phonics_suffixes"], "next": "phonics_capstone", "summary": "Four common prefixes (un-, re-, pre-, dis-) with their meanings. Twelve examples + decodable sentence using four prefixed words. Check surfaces the unhappy-vs-dishappy convention — first exposure to 'multiple options, conventions decide'.", "domains": ["linguistics", "phonics", "pedagogy"], "axes": ["information_encoding", "reasoning"]}];window.NH_LABELS={"brand": "Read", "dir": "ltr", "title": "Read — a free school that works anywhere", "lesson": "Lesson", "of": "of", "examples": "Examples", "read_aloud": "Read this out loud", "practice": "Practice together", "check": "Check:", "show": "Show the answer", "back": "Back", "next": "Next", "footer": "Free, and yours — to keep, to copy, to give. Works with no internet, on any device. This school teaches reading; for the deeper questions it points beyond itself, to Christ.", "review": "", "source": "data/phonics/units.jsonl", "lang": "en"};</script>
<script>
var UNITS = window.NH_UNITS || [];
var L = window.NH_LABELS || {};
var i = 0;
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function render(){
  var u = UNITS[i]; if(!u){return;}
  document.getElementById("prog").textContent = L.lesson + " " + (i+1) + " " + L.of + " " + UNITS.length;
  var h = "";
  h += '<div class="seq">' + esc(u.track || "") + '</div>';
  h += '<h1>' + esc(u.title || u.id) + '</h1>';
  if(u.rule){ h += '<div class="rule">' + esc(u.rule) + '</div>'; }
  if(u.examples && u.examples.length){
    h += '<div class="h">' + esc(L.examples) + '</div><div class="ex">';
    for(var e=0;e<u.examples.length;e++){ h += '<span>' + esc(u.examples[e]) + '</span>'; }
    h += '</div>';
  }
  if(u.decodable_sentence){ h += '<div class="h">' + esc(L.read_aloud) + '</div><div class="say">' + esc(u.decodable_sentence) + '</div>'; }
  if(u.modes && u.modes.length){
    h += '<div class="h">' + esc(L.practice) + '</div>';
    for(var m=0;m<u.modes.length;m++){ var mo=u.modes[m];
      h += '<div class="mode"><div class="lab">' + esc(mo.label||"") + '</div>';
      if(mo.instruction){ h += '<div class="ins">' + esc(mo.instruction) + '</div>'; }
      if(mo.script){ h += '<div class="scr">' + esc(mo.script) + '</div>'; }
      h += '</div>';
    }
  }
  if(u.check && (u.check.prompt || u.check.question)){
    var q = u.check.prompt || u.check.question;
    h += '<div class="check"><div class="q">' + esc(L.check) + ' ' + esc(q) + '</div>';
    h += '<button class="reveal" data-reveal="1">' + esc(L.show) + '</button>';
    h += '<div class="ans"><div class="a">' + esc(u.check.answer||"") + '</div>';
    if(u.check.teaching_note){ h += '<div class="note">' + esc(u.check.teaching_note) + '</div>'; }
    h += '</div></div>';
  }
  document.getElementById("view").innerHTML = h;
  document.getElementById("prev").disabled = (i<=0);
  document.getElementById("next").disabled = (i>=UNITS.length-1);
  document.getElementById("toc").classList.remove("show");
  window.scrollTo(0,0);
  try{ localStorage.setItem("nh_read_at_"+(L.lang||"x"), String(i)); }catch(e){}
}
function go(n){ i=Math.max(0,Math.min(UNITS.length-1,n)); render(); }
document.getElementById("prev").onclick=function(){go(i-1);};
document.getElementById("next").onclick=function(){go(i+1);};
document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft")go(i-1); if(e.key==="ArrowRight")go(i+1); });
var toc = document.getElementById("toc"); var th="";
for(var t=0;t<UNITS.length;t++){ th += '<a href="#" data-i="'+t+'">'+(t+1)+'. '+esc(UNITS[t].title||UNITS[t].id)+'</a>'; }
toc.innerHTML = th;
toc.addEventListener("click",function(e){ var a=e.target.closest("a"); if(a){ e.preventDefault(); go(parseInt(a.getAttribute("data-i"),10)); } });
document.getElementById("tocBtn").onclick=function(){ toc.classList.toggle("show"); };
document.getElementById("view").addEventListener("click",function(e){ var b=e.target.closest("[data-reveal]"); if(b){ var a=b.nextElementSibling; if(a){a.classList.add("show");} b.style.display="none"; } });
try{ var saved=parseInt(localStorage.getItem("nh_read_at_"+(L.lang||"x")),10); if(!isNaN(saved)) i=Math.max(0,Math.min(UNITS.length-1,saved)); }catch(e){}
render();
</script>
